name: walkforward-halfyear

on:
  workflow_dispatch:
    inputs:
      # (1) WF controls (3)
      wf_start:
        description: "first half-year (e.g. 2018H1)"
        required: true
        default: "2018H1"
      wf_end:
        description: "last half-year (e.g. 2025H2)"
        required: true
        default: "2025H2"
      train_years:
        description: "train window in years (e.g. 12)"
        required: true
        default: "12"

      # (2) Core strategy controls (3)
      PROFIT_TARGET:
        description: "profit target (e.g. 0.10)"
        required: true
        default: "0.10"
      MAX_DAYS:
        description: "max holding days H (e.g. 40)"
        required: true
        default: "40"
      STOP_LEVEL:
        description: "stop level (e.g. -0.10)"
        required: true
        default: "-0.10"

jobs:
  raw-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (raw-data)
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U yfinance pandas pyarrow

      - name: Build universe.csv (if missing)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data
          if [ ! -f data/universe.csv ]; then
            echo "[INFO] data/universe.csv missing -> generating via scripts/universe.py"
            python scripts/universe.py
          fi
          ls -la data | sed -n '1,200p'
          test -f data/universe.csv

      - name: Fetch raw prices (Yahoo)
        env:
          MAX_YEARS: "16"
        run: |
          set -euo pipefail
          mkdir -p data/raw
          python scripts/fetch_prices.py --include-extra
          ls -la data/raw
          test -f data/raw/prices.parquet -o -f data/raw/prices.csv

      - name: Upload artifact raw-data
        uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: data/raw
          if-no-files-found: error

  make-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Generate half-year matrix JSON
        id: gen
        shell: bash
        run: |
          python - <<'PY' > /tmp/matrix.json
          import json, re
          from datetime import date, timedelta

          wf_start = "${{ inputs.wf_start }}".strip()
          wf_end   = "${{ inputs.wf_end }}".strip()
          train_years = int("${{ inputs.train_years }}")

          m = re.fullmatch(r"(\d{4})H([12])", wf_start)
          n = re.fullmatch(r"(\d{4})H([12])", wf_end)
          if not m or not n:
            raise SystemExit("wf_start/wf_end must be like 2018H1")

          sy, sh = int(m.group(1)), int(m.group(2))
          ey, eh = int(n.group(1)), int(n.group(2))

          def half_start(y,h): return date(y,1,1) if h==1 else date(y,7,1)
          def half_end(y,h):   return date(y,6,30) if h==1 else date(y,12,31)

          items=[]
          y,h=sy,sh
          while True:
            period=f"{y}H{h}"
            test_start=half_start(y,h); test_end=half_end(y,h)
            vy,vh=(y-1,2) if h==1 else (y,1)
            valid_start=half_start(vy,vh); valid_end=half_end(vy,vh)
            train_end=valid_start - timedelta(days=1)
            train_start=date(train_end.year-train_years+1, train_end.month, train_end.day)
            cut_date=valid_end
            items.append({
              "period":period,
              "TRAIN_START":train_start.isoformat(),
              "TRAIN_END":train_end.isoformat(),
              "VALID_START":valid_start.isoformat(),
              "VALID_END":valid_end.isoformat(),
              "TEST_START":test_start.isoformat(),
              "TEST_END":test_end.isoformat(),
              "CUT_DATE":cut_date.isoformat(),
            })
            if y==ey and h==eh: break
            if h==1: h=2
            else: y+=1; h=1

          print(json.dumps({"include":items}, ensure_ascii=False))
          PY

          echo "matrix<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/matrix.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  train:
    name: train-models (per half-year)
    needs: [raw-data, make-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.make-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (train)
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U pandas pyarrow

      - name: Download raw-data artifact
        uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: data/raw

      - name: Verify raw-data present
        run: |
          ls -la data/raw
          test -f data/raw/prices.parquet -o -f data/raw/prices.csv

      - name: Train models for this half-year
        env:
          # ---- matrix slice
          WF_PERIOD: ${{ matrix.period }}
          TRAIN_START: ${{ matrix.TRAIN_START }}
          TRAIN_END: ${{ matrix.TRAIN_END }}
          VALID_START: ${{ matrix.VALID_START }}
          VALID_END: ${{ matrix.VALID_END }}
          TEST_START: ${{ matrix.TEST_START }}
          TEST_END: ${{ matrix.TEST_END }}
          CUT_DATE: ${{ matrix.CUT_DATE }}

          # ---- core label params
          PROFIT_TARGET: ${{ inputs.PROFIT_TARGET }}
          MAX_DAYS: ${{ inputs.MAX_DAYS }}
          STOP_LEVEL: ${{ inputs.STOP_LEVEL }}

          # ---- tail label needs this (your error log)
          MAX_EXTEND_DAYS: "20"

          # ---- tau mapping (score_features uses this)
          TAU_H_MAP: "30,40,50"
        shell: bash
        run: |
          set -euo pipefail
          TAG="wf_${WF_PERIOD}"
          echo "[TRAIN] TAG=${TAG} CUT_DATE=${CUT_DATE}"
          echo "[TRAIN] TRAIN ${TRAIN_START}..${TRAIN_END} VALID ${VALID_START}..${VALID_END}"

          # 0) universe.csv (if missing)
          if [ ! -f data/universe.csv ]; then
            echo "[INFO] data/universe.csv missing -> generating from raw prices"
            python - <<'PY'
          from pathlib import Path
          import pandas as pd
          raw_parq = Path("data/raw/prices.parquet")
          raw_csv  = Path("data/raw/prices.csv")
          if raw_parq.exists():
              df = pd.read_parquet(raw_parq)
          elif raw_csv.exists():
              df = pd.read_csv(raw_csv)
          else:
              raise SystemExit("[ERROR] raw prices missing")
          if "Ticker" not in df.columns:
              raise SystemExit("[ERROR] raw prices missing Ticker column")
          ticks = (
              df["Ticker"].astype(str).str.upper().str.strip()
                .dropna().unique().tolist()
          )
          ticks = sorted(set([t for t in ticks if t]))
          out = pd.DataFrame({"Ticker": ticks, "Enabled": True})
          Path("data").mkdir(parents=True, exist_ok=True)
          out.to_csv("data/universe.csv", index=False)
          print(f"[DONE] wrote data/universe.csv tickers={len(out)}")
          PY
          fi

          # 1) build features (repo 기준: build_features.py는 cut-date 안 받음)
          python scripts/build_features.py

          # 2) build labels (repo 기준: build_labels.py는 아래 인자만 받음)
          python scripts/build_labels.py \
            --profit-target "${PROFIT_TARGET}" \
            --max-days "${MAX_DAYS}" \
            --stop-level "${STOP_LEVEL}" \
            --start-date "${TRAIN_START}"

          # 3) build tail labels (repo 기준: --max-extend-days 필수)
          python scripts/build_tail_labels.py \
            --profit-target "${PROFIT_TARGET}" \
            --max-days "${MAX_DAYS}" \
            --stop-level "${STOP_LEVEL}" \
            --max-extend-days "${MAX_EXTEND_DAYS}"

          # 4) train gate / tail / badexit / tau (레포 파일명 기준)
          #    (각 스크립트가 내부적으로 data/*를 읽고 app/*.pkl 혹은 report json을 쓰는 구조를 가정)
          echo "[TRAIN] train_model.py --tag ${TAG}"
          python scripts/train_model.py --tag "${TAG}"

          echo "[TRAIN] train_tail_model.py --tag ${TAG}"
          python scripts/train_tail_model.py --tag "${TAG}"

          echo "[TRAIN] train_badexit_model_wf_lite.py --tag ${TAG}"
          python scripts/train_badexit_model_wf_lite.py --tag "${TAG}"

          echo "[TRAIN] train_tau_model.py --tag ${TAG}"
          python scripts/train_tau_model.py --tag "${TAG}" || true

          # 5) stage models so score_features can find them (data/models/<TAG>/)
          mkdir -p "data/models/${TAG}"

          echo "[TRAIN] app/ contents:"
          ls -la app | sed -n '1,200p' || true

          shopt -s nullglob
          for f in app/*.pkl; do
            cp -v "$f" "data/models/${TAG}/" || true
          done

          echo "[TRAIN] data/models/${TAG} contents:"
          ls -la "data/models/${TAG}" | sed -n '1,200p' || true

          # fail fast if essential gate model/scaler not staged
          test -f "data/models/${TAG}/model.pkl"
          test -f "data/models/${TAG}/scaler.pkl"

      - name: Upload artifact (models for this half-year)
        uses: actions/upload-artifact@v4
        with:
          name: models_${{ matrix.period }}
          path: data/models/wf_${{ matrix.period }}
          if-no-files-found: error

  run:
    needs: [raw-data, make-matrix, train]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.make-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Download raw-data artifact
        uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: data/raw

      - name: Download models artifact (this half-year)
        uses: actions/download-artifact@v4
        with:
          name: models_${{ matrix.period }}
          path: data/models/wf_${{ matrix.period }}

      - name: Verify inputs present
        shell: bash
        run: |
          set -euo pipefail
          ls -la data/raw | sed -n '1,200p'
          test -f data/raw/prices.parquet -o -f data/raw/prices.csv

          echo "[INFO] model dir:"
          ls -la "data/models/wf_${{ matrix.period }}" | sed -n '1,200p'
          test -f "data/models/wf_${{ matrix.period }}/model.pkl"
          test -f "data/models/wf_${{ matrix.period }}/scaler.pkl"

      - name: Walkforward run (one half-year)
        env:
          # ---- matrix slice
          WF_PERIOD: ${{ matrix.period }}
          TRAIN_START: ${{ matrix.TRAIN_START }}
          TRAIN_END: ${{ matrix.TRAIN_END }}
          VALID_START: ${{ matrix.VALID_START }}
          VALID_END: ${{ matrix.VALID_END }}
          TEST_START: ${{ matrix.TEST_START }}
          TEST_END: ${{ matrix.TEST_END }}
          CUT_DATE: ${{ matrix.CUT_DATE }}

          # ---- 6 inputs (wf 3 + core 3)
          PROFIT_TARGET: ${{ inputs.PROFIT_TARGET }}
          MAX_DAYS: ${{ inputs.MAX_DAYS }}
          STOP_LEVEL: ${{ inputs.STOP_LEVEL }}

          # ---- grid defaults (workflow에서 고정)
          P_TAIL_THRESHOLDS: "0.10,0.20,0.30"
          UTILITY_QUANTILES: "0.60,0.75,0.90"
          RANK_METRICS: "utility"
          LAMBDA_TAIL: "1.0"
          GATE_MODES: "tail_utility"
          TRAIL_STOPS: "0.10"
          TP1_FRAC: "0.50"
          ENABLE_TRAILING: "true"
          TOPK_CONFIGS: "1|1.0"
          PS_MINS: "0.00"
          BADEXIT_MAXES: "1.00"
          MAX_LEVERAGE_PCT: "1.0"

          # ---- model location for scoring
          MODEL_DIR: data/models/wf_${{ matrix.period }}

          # ---- set -u 터지는 애들: 무조건 세팅(빈 문자열 OK)
          EXCLUDE_TICKERS: ""
          REQUIRE_FILES: ""

          # ---- optional regime defaults
          REGIME_MODE: "off"
          REGIME_DD_MAX: "0.20"
          REGIME_RET20_MIN: "0.00"
          REGIME_ATR_MAX: "1.30"
          REGIME_LEVERAGE_MULT: "3.0"

          # ---- optional toggles (기본 off)
          TAU_SPLIT: ""
          USE_TAU_H: "false"
          ENABLE_DCA: "false"

          # ---- output partitioning
          OUT_DIR_BASE: data/signals/walkforward
          WF_TAG_BASE: wf

        run: |
          chmod +x scripts/run_walkforward_halfyear.sh
          ./scripts/run_walkforward_halfyear.sh

      - name: Upload artifacts (this half-year)
        uses: actions/upload-artifact@v4
        with:
          name: walkforward_${{ matrix.period }}
          path: data/signals/walkforward/${{ matrix.period }}
          if-no-files-found: warn

  aggregate:
    name: aggregate-walkforward
    needs: [run]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (aggregate)
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U pandas pyarrow

      - name: Download all walkforward artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: walkforward_*
          path: _wf_artifacts

      - name: Rebuild expected folder structure
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data/signals/walkforward

          echo "[INFO] downloaded artifacts:"
          ls -la _wf_artifacts | sed -n '1,200p'

          shopt -s nullglob
          for d in _wf_artifacts/walkforward_*; do
            base="$(basename "$d")"             # e.g. walkforward_2018H1
            period="${base#walkforward_}"       # e.g. 2018H1
            out="data/signals/walkforward/${period}"
            mkdir -p "$out"
            echo "[INFO] stage ${base} -> ${out}"
            rsync -a "${d}/" "${out}/"
          done

          echo "[INFO] final tree:"
          find data/signals/walkforward -maxdepth 2 -type d | sed -n '1,200p'
          test "$(find data/signals/walkforward -mindepth 1 -maxdepth 1 -type d | wc -l)" -ge 1

      - name: Aggregate metrics across periods
        run: |
          set -euo pipefail
          python scripts/aggregate_walkforward_halfyear.py \
            --root data/signals/walkforward \
            --out data/signals/walkforward/_summary_walkforward.csv

          ls -la data/signals/walkforward | sed -n '1,200p'
          test -f data/signals/walkforward/_summary_walkforward.csv

      - name: Analyze summary (rank configs)
        run: |
          set -euo pipefail
          python scripts/analyze_walkforward_summary.py \
            --summary data/signals/walkforward/_summary_walkforward.csv \
            --out data/signals/walkforward/_analysis_walkforward.csv

          ls -la data/signals/walkforward | sed -n '1,200p'
          test -f data/signals/walkforward/_analysis_walkforward.csv

      - name: Upload artifact (walkforward summary)
        uses: actions/upload-artifact@v4
        with:
          name: walkforward_summary
          path: |
            data/signals/walkforward/_summary_walkforward.csv
            data/signals/walkforward/_analysis_walkforward.csv
          if-no-files-found: error