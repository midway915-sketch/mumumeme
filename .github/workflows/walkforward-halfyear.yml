name: walkforward-halfyear

on:
  workflow_dispatch:
    inputs:
      # (1) WF controls (3)
      wf_start:
        description: "first half-year (e.g. 2018H1)"
        required: true
        default: "2018H1"
      wf_end:
        description: "last half-year (e.g. 2025H2)"
        required: true
        default: "2025H2"
      train_years:
        description: "train window in years (e.g. 12)"
        required: true
        default: "12"

      # (2) Core strategy controls (3)
      PROFIT_TARGET:
        description: "profit target (e.g. 0.10)"
        required: true
        default: "0.10"
      MAX_DAYS:
        description: "max holding days H (e.g. 40)"
        required: true
        default: "40"
      STOP_LEVEL:
        description: "stop level (e.g. -0.10)"
        required: true
        default: "-0.10"

jobs:
  raw-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (raw-data)
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U yfinance pandas pyarrow

      - name: Build universe.csv (if missing)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data
          if [ ! -f data/universe.csv ]; then
            echo "[INFO] data/universe.csv missing -> generating via scripts/universe.py"
            python scripts/universe.py
          fi
          ls -la data | sed -n '1,200p'
          test -f data/universe.csv

      - name: Fetch raw prices (Yahoo)
        env:
          MAX_YEARS: "16"
        run: |
          set -euo pipefail
          mkdir -p data/raw
          python scripts/fetch_prices.py --include-extra
          ls -la data/raw
          test -f data/raw/prices.parquet -o -f data/raw/prices.csv

      - name: Upload artifact raw-data
        uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: data/raw
          if-no-files-found: error

  make-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Generate half-year matrix JSON
        id: gen
        shell: bash
        run: |
          python - <<'PY' > /tmp/matrix.json
          import json, re
          from datetime import date, timedelta

          wf_start = "${{ inputs.wf_start }}".strip()
          wf_end   = "${{ inputs.wf_end }}".strip()
          train_years = int("${{ inputs.train_years }}")

          m = re.fullmatch(r"(\d{4})H([12])", wf_start)
          n = re.fullmatch(r"(\d{4})H([12])", wf_end)
          if not m or not n:
            raise SystemExit("wf_start/wf_end must be like 2018H1")

          sy, sh = int(m.group(1)), int(m.group(2))
          ey, eh = int(n.group(1)), int(n.group(2))

          def half_start(y,h): return date(y,1,1) if h==1 else date(y,7,1)
          def half_end(y,h):   return date(y,6,30) if h==1 else date(y,12,31)

          items=[]
          y,h=sy,sh
          while True:
            period=f"{y}H{h}"
            test_start=half_start(y,h); test_end=half_end(y,h)
            vy,vh=(y-1,2) if h==1 else (y,1)
            valid_start=half_start(vy,vh); valid_end=half_end(vy,vh)
            train_end=valid_start - timedelta(days=1)
            train_start=date(train_end.year-train_years+1, train_end.month, train_end.day)
            cut_date=valid_end
            items.append({
              "period":period,
              "TRAIN_START":train_start.isoformat(),
              "TRAIN_END":train_end.isoformat(),
              "VALID_START":valid_start.isoformat(),
              "VALID_END":valid_end.isoformat(),
              "TEST_START":test_start.isoformat(),
              "TEST_END":test_end.isoformat(),
              "CUT_DATE":cut_date.isoformat(),
            })
            if y==ey and h==eh: break
            if h==1: h=2
            else: y+=1; h=1

          print(json.dumps({"include":items}, ensure_ascii=False))
          PY

          echo "matrix<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/matrix.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  run:
    needs: [raw-data, make-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.make-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U pandas pyarrow

      - name: Download raw-data artifact
        uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: data/raw

      - name: Verify raw-data present
        run: |
          ls -la data/raw
          test -f data/raw/prices.parquet -o -f data/raw/prices.csv

      # ============================================================
      # (A) TRAIN MODELS (per half-year) -> tag = wf_${period}
      #     - build features/labels
      #     - cut to CUT_DATE (== VALID_END) to avoid leakage
      #     - train p_success(per H), p_tail(per H), p_badexit, tau
      # ============================================================
      - name: Train models for this half-year (cut at CUT_DATE)
        env:
          WF_PERIOD: ${{ matrix.period }}
          TRAIN_START: ${{ matrix.TRAIN_START }}
          TRAIN_END: ${{ matrix.TRAIN_END }}
          VALID_START: ${{ matrix.VALID_START }}
          VALID_END: ${{ matrix.VALID_END }}
          TEST_START: ${{ matrix.TEST_START }}
          TEST_END: ${{ matrix.TEST_END }}
          CUT_DATE: ${{ matrix.CUT_DATE }}

          PROFIT_TARGET: ${{ inputs.PROFIT_TARGET }}
          MAX_DAYS: ${{ inputs.MAX_DAYS }}
          STOP_LEVEL: ${{ inputs.STOP_LEVEL }}

          # tau class -> H mapping (score_features.py 기본과 맞춤)
          TAU_H_MAP: "30,40,50"

          # labels 옵션 (레포 build_labels.py 기본값과 맞춤)
          MAX_EXTEND_DAYS: "20"
          ENABLE_TRAILING: "true"
          TRAIL_STOP: "0.10"
          TP1_FRAC: "0.50"
          TP1_HOLD_CAP_MODE: "none"
          TP1_HOLD_CAP_SINGLE: "none"
          CAP_COMPARE: "false"
          TP1_TRAIL_UNLIMITED: "true"
          ENABLE_DCA: "false"
        shell: bash
        run: |
          set -euo pipefail

          TAG="wf_${WF_PERIOD}"
          echo "[TRAIN] TAG=${TAG} CUT_DATE=${CUT_DATE}"
          mkdir -p data/features data/labels data/meta app

          # 0) universe.csv (없으면 raw에서 생성)
          if [ ! -f data/universe.csv ]; then
            echo "[INFO] data/universe.csv missing -> generating from raw prices"
            python - <<'PY'
          from pathlib import Path
          import pandas as pd
          raw_parq = Path("data/raw/prices.parquet")
          raw_csv  = Path("data/raw/prices.csv")
          if raw_parq.exists():
              df = pd.read_parquet(raw_parq)
          elif raw_csv.exists():
              df = pd.read_csv(raw_csv)
          else:
              raise SystemExit("[ERROR] raw prices missing")
          ticks = df["Ticker"].astype(str).str.upper().str.strip().dropna().unique().tolist()
          ticks = sorted(set([t for t in ticks if t]))
          out = pd.DataFrame({"Ticker": ticks, "Enabled": True})
          Path("data").mkdir(parents=True, exist_ok=True)
          out.to_csv("data/universe.csv", index=False)
          print(f"[DONE] wrote data/universe.csv tickers={len(out)}")
          PY
                    fi

          # 1) features (TRAIN_START부터 생성; 이후 CUT_DATE로 잘라 tag 스냅샷 작성)
          python scripts/build_features.py --start-date "${TRAIN_START}"

          # 2) labels 생성 (레포 스크립트 기준)
          #    p_success labels_model.parquet 는 tag별 파일이 기본이 아니라서,
          #    생성 후 labels_model_{TAG}.parquet 로 "스냅샷 복사"를 만들어줌.
          python scripts/build_labels.py \
            --profit-target "${PROFIT_TARGET}" \
            --max-days "${MAX_DAYS}" \
            --stop-level "${STOP_LEVEL}" \
            --max-extend-days "${MAX_EXTEND_DAYS}" \
            --trail-stop "${TRAIL_STOP}" \
            --tp1-frac "${TP1_FRAC}" \
            --enable-trailing "${ENABLE_TRAILING}" \
            --tp1-hold-cap-mode "${TP1_HOLD_CAP_MODE}" \
            --tp1-hold-cap-single "${TP1_HOLD_CAP_SINGLE}" \
            --cap-compare "${CAP_COMPARE}" \
            --tp1-trail-unlimited "${TP1_TRAIL_UNLIMITED}" \
            --enable-dca "${ENABLE_DCA}"

          # tail / badexit / tau labels (얘들은 --tag 지원)
          python scripts/build_tail_labels.py \
            --tag "${TAG}" \
            --profit-target "${PROFIT_TARGET}" \
            --max-days "${MAX_DAYS}" \
            --stop-level "${STOP_LEVEL}" \
            --max-extend-days "${MAX_EXTEND_DAYS}" \
            --trail-stop "${TRAIL_STOP}" \
            --tp1-frac "${TP1_FRAC}" \
            --enable-trailing "${ENABLE_TRAILING}" \
            --tp1-hold-cap-mode "${TP1_HOLD_CAP_MODE}" \
            --tp1-hold-cap-single "${TP1_HOLD_CAP_SINGLE}" \
            --cap-compare "${CAP_COMPARE}" \
            --tp1-trail-unlimited "${TP1_TRAIL_UNLIMITED}" \
            --enable-dca "${ENABLE_DCA}"

          python scripts/build_badexit_labels.py \
            --tag "${TAG}" \
            --profit-target "${PROFIT_TARGET}" \
            --max-days "${MAX_DAYS}" \
            --stop-level "${STOP_LEVEL}" \
            --max-extend-days "${MAX_EXTEND_DAYS}" \
            --trail-stop "${TRAIL_STOP}" \
            --tp1-frac "${TP1_FRAC}" \
            --enable-trailing "${ENABLE_TRAILING}" \
            --tp1-hold-cap-mode "${TP1_HOLD_CAP_MODE}" \
            --tp1-hold-cap-single "${TP1_HOLD_CAP_SINGLE}" \
            --cap-compare "${CAP_COMPARE}" \
            --tp1-trail-unlimited "${TP1_TRAIL_UNLIMITED}" \
            --enable-dca "${ENABLE_DCA}"

          python scripts/build_tau_labels.py \
            --tag "${TAG}" \
            --profit-target "${PROFIT_TARGET}" \
            --stop-level "${STOP_LEVEL}" \
            --max-days "${MAX_DAYS}" \
            --max-extend-days "${MAX_EXTEND_DAYS}" \
            --trail-stop "${TRAIL_STOP}" \
            --tp1-frac "${TP1_FRAC}" \
            --enable-trailing "${ENABLE_TRAILING}" \
            --tp1-hold-cap-mode "${TP1_HOLD_CAP_MODE}" \
            --tp1-hold-cap-single "${TP1_HOLD_CAP_SINGLE}" \
            --cap-compare "${CAP_COMPARE}" \
            --tp1-trail-unlimited "${TP1_TRAIL_UNLIMITED}" \
            --enable-dca "${ENABLE_DCA}"

          # 3) CUT_DATE로 tag 스냅샷 만들기 (누수 방지)
          python - <<'PY'
          import os
          from pathlib import Path
          import pandas as pd
          
          TAG = os.environ["TAG"]
          CUT = pd.to_datetime(os.environ["CUT_DATE"])
          
          def read_any(parq, csv):
              if Path(parq).exists(): return pd.read_parquet(parq)
              if Path(csv).exists():  return pd.read_csv(csv)
              raise FileNotFoundError(f"missing {parq} or {csv}")
          
          def write_parq(df, p):
              Path(p).parent.mkdir(parents=True, exist_ok=True)
              df.to_parquet(p, index=False)
          
          # features_model -> features_model_{TAG}.parquet (cut)
          f = read_any("data/features/features_model.parquet", "data/features/features_model.csv")
          f["Date"] = pd.to_datetime(f["Date"], errors="coerce").dt.tz_localize(None)
          f = f.dropna(subset=["Date"])
          f_cut = f[f["Date"] <= CUT].copy()
          write_parq(f_cut, f"data/features/features_model_{TAG}.parquet")
          print("[SNAP] features_model rows:", len(f), "-> cut:", len(f_cut))
          
          # p_success labels_model -> labels_model_{TAG}.parquet (cut)
          lm = read_any("data/labels/labels_model.parquet", "data/labels/labels_model.csv")
          lm["Date"] = pd.to_datetime(lm["Date"], errors="coerce").dt.tz_localize(None)
          lm = lm.dropna(subset=["Date"])
          lm_cut = lm[lm["Date"] <= CUT].copy()
          write_parq(lm_cut, f"data/labels/labels_model_{TAG}.parquet")
          print("[SNAP] labels_model rows:", len(lm), "-> cut:", len(lm_cut))
          
          # tag 기반 labels는 파일명이 이미 tag를 포함함. (tail/badexit/tau)
          def snap_tagged(stem):
              p = Path(f"data/labels/{stem}_{TAG}.parquet")
              if not p.exists():
                  print("[WARN] missing", p)
                  return
              df = pd.read_parquet(p)
              df["Date"] = pd.to_datetime(df["Date"], errors="coerce").dt.tz_localize(None)
              df = df.dropna(subset=["Date"])
              df_cut = df[df["Date"] <= CUT].copy()
              df_cut.to_parquet(p, index=False)  # 같은 파일을 cut으로 덮어씀
              print(f"[SNAP] {p.name} -> cut rows={len(df_cut)}")
          
          snap_tagged("labels_tail")
          snap_tagged("labels_badexit")
          snap_tagged("labels_tau")
          PY
                    TAG="${TAG}" CUT_DATE="${CUT_DATE}" python - <<'PY'
          # env 바인딩용 no-op
          PY

          # 4) train (레포 스크립트/인자 그대로)
          #    - p_success/p_tail 은 per-H (TAU_H_MAP 기준 30/40/50)
          IFS=',' read -r H0 H1 H2 <<< "${TAU_H_MAP}"

          for H in "${H0}" "${H1}" "${H2}"; do
            echo "[TRAIN] train_model tag=${TAG} H=${H}"
            python scripts/train_model.py --tag "${TAG}" --H "${H}" --label-col "y"

            echo "[TRAIN] train_tail_model tag=${TAG} H=${H}"
            python scripts/train_tail_model.py --tag "${TAG}" --H "${H}" --label-col "y_tail"
          done

          echo "[TRAIN] train_badexit_model tag=${TAG}"
          python scripts/train_badexit_model.py --tag "${TAG}"

          echo "[TRAIN] train_tau_model tag=${TAG}"
          python scripts/train_tau_model.py --tag "${TAG}"

          echo "[TRAIN] produced app/:"
          ls -la app | sed -n '1,200p'

      # ============================================================
      # (B) WALKFORWARD (same period)
      # ============================================================
      - name: Walkforward run (one half-year)
        env:
          # ---- matrix slice
          WF_PERIOD: ${{ matrix.period }}
          TRAIN_START: ${{ matrix.TRAIN_START }}
          TRAIN_END: ${{ matrix.TRAIN_END }}
          VALID_START: ${{ matrix.VALID_START }}
          VALID_END: ${{ matrix.VALID_END }}
          TEST_START: ${{ matrix.TEST_START }}
          TEST_END: ${{ matrix.TEST_END }}
          CUT_DATE: ${{ matrix.CUT_DATE }}

          # ---- 6 inputs (wf 3 + core 3)
          PROFIT_TARGET: ${{ inputs.PROFIT_TARGET }}
          MAX_DAYS: ${{ inputs.MAX_DAYS }}
          STOP_LEVEL: ${{ inputs.STOP_LEVEL }}

          # ---- grid defaults (workflow에서 고정)
          P_TAIL_THRESHOLDS: "0.10,0.20,0.30"
          UTILITY_QUANTILES: "0.60,0.75,0.90"
          RANK_METRICS: "utility"
          LAMBDA_TAIL: "1.0"
          GATE_MODES: "tail_utility"
          TRAIL_STOPS: "0.10"
          TP1_FRAC: "0.50"
          ENABLE_TRAILING: "true"
          TOPK_CONFIGS: "1|1.0"
          PS_MINS: "0.00"
          BADEXIT_MAXES: "1.00"
          MAX_LEVERAGE_PCT: "1.0"

          # ---- set -u 터지는 애들: 무조건 세팅(빈 문자열 OK)
          EXCLUDE_TICKERS: ""
          REQUIRE_FILES: ""

          # ---- optional regime defaults
          REGIME_MODE: "off"
          REGIME_DD_MAX: "0.20"
          REGIME_RET20_MIN: "0.00"
          REGIME_ATR_MAX: "1.30"
          REGIME_LEVERAGE_MULT: "3.0"

          # ---- optional toggles (기본 off)
          TAU_SPLIT: ""
          USE_TAU_H: "false"
          ENABLE_DCA: "false"

          # ---- output partitioning
          OUT_DIR_BASE: data/signals/walkforward
          WF_TAG_BASE: wf
        run: |
          chmod +x scripts/run_walkforward_halfyear.sh
          ./scripts/run_walkforward_halfyear.sh

      - name: Upload artifacts (this half-year)
        uses: actions/upload-artifact@v4
        with:
          name: walkforward_${{ matrix.period }}
          path: data/signals/walkforward/${{ matrix.period }}
          if-no-files-found: warn

  aggregate:
    name: aggregate-walkforward
    needs: [run]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (aggregate)
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U pandas pyarrow

      - name: Download all walkforward artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: walkforward_*
          path: _wf_artifacts

      - name: Rebuild expected folder structure
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data/signals/walkforward

          echo "[INFO] downloaded artifacts:"
          ls -la _wf_artifacts | sed -n '1,200p'

          shopt -s nullglob
          for d in _wf_artifacts/walkforward_*; do
            base="$(basename "$d")"
            period="${base#walkforward_}"
            out="data/signals/walkforward/${period}"
            mkdir -p "$out"
            echo "[INFO] stage ${base} -> ${out}"
            rsync -a "${d}/" "${out}/"
          done

          echo "[INFO] final tree:"
          find data/signals/walkforward -maxdepth 2 -type d | sed -n '1,200p'
          test "$(find data/signals/walkforward -mindepth 1 -maxdepth 1 -type d | wc -l)" -ge 1

      - name: Aggregate metrics across periods
        run: |
          set -euo pipefail
          python scripts/aggregate_walkforward_halfyear.py \
            --root data/signals/walkforward \
            --out data/signals/walkforward/_summary_walkforward.csv

          ls -la data/signals/walkforward | sed -n '1,200p'
          test -f data/signals/walkforward/_summary_walkforward.csv

      - name: Analyze summary (rank configs)
        run: |
          set -euo pipefail
          python scripts/analyze_walkforward_summary.py \
            --summary data/signals/walkforward/_summary_walkforward.csv \
            --out data/signals/walkforward/_analysis_walkforward.csv

          ls -la data/signals/walkforward | sed -n '1,200p'
          test -f data/signals/walkforward/_analysis_walkforward.csv

      - name: Upload artifact (walkforward summary)
        uses: actions/upload-artifact@v4
        with:
          name: walkforward_summary
          path: |
            data/signals/walkforward/_summary_walkforward.csv
            data/signals/walkforward/_analysis_walkforward.csv
          if-no-files-found: error