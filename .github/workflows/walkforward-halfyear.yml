name: walkforward-halfyear

on:
  workflow_dispatch:
    inputs:
      wf_start:
        description: "first half-year (e.g. 2018H1)"
        required: true
        default: "2018H1"
      wf_end:
        description: "last half-year (e.g. 2025H2)"
        required: true
        default: "2025H2"
      train_years:
        description: "train window in years (e.g. 12)"
        required: true
        default: "12"

      PROFIT_TARGET:
        description: "profit target (e.g. 0.10)"
        required: true
        default: "0.10"
      MAX_DAYS:
        description: "max holding days H (e.g. 40)"
        required: true
        default: "40"
      STOP_LEVEL:
        description: "stop level (e.g. -0.10)"
        required: true
        default: "-0.10"

jobs:
  raw-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (raw-data)
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U yfinance pandas pyarrow

      - name: Build universe.csv (if missing)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data
          if [ ! -f data/universe.csv ]; then
            echo "[INFO] data/universe.csv missing -> generating via scripts/universe.py"
            python scripts/universe.py
          fi
          ls -la data | sed -n '1,200p'
          test -f data/universe.csv

      - name: Fetch raw prices (Yahoo)
        env:
          MAX_YEARS: "16"
        run: |
          set -euo pipefail
          mkdir -p data/raw
          python scripts/fetch_prices.py --include-extra
          ls -la data/raw
          test -f data/raw/prices.parquet -o -f data/raw/prices.csv

      - name: Upload artifact raw-data
        uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: data/raw
          if-no-files-found: error

  make-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Generate half-year matrix JSON
        id: gen
        shell: bash
        run: |
          python - <<'PY' > /tmp/matrix.json
          import json, re
          from datetime import date, timedelta

          wf_start = "${{ inputs.wf_start }}".strip()
          wf_end   = "${{ inputs.wf_end }}".strip()
          train_years = int("${{ inputs.train_years }}")

          m = re.fullmatch(r"(\d{4})H([12])", wf_start)
          n = re.fullmatch(r"(\d{4})H([12])", wf_end)
          if not m or not n:
            raise SystemExit("wf_start/wf_end must be like 2018H1")

          sy, sh = int(m.group(1)), int(m.group(2))
          ey, eh = int(n.group(1)), int(n.group(2))

          def half_start(y,h): return date(y,1,1) if h==1 else date(y,7,1)
          def half_end(y,h):   return date(y,6,30) if h==1 else date(y,12,31)

          items=[]
          y,h=sy,sh
          while True:
            period=f"{y}H{h}"
            test_start=half_start(y,h); test_end=half_end(y,h)
            vy,vh=(y-1,2) if h==1 else (y,1)
            valid_start=half_start(vy,vh); valid_end=half_end(vy,vh)
            train_end=valid_start - timedelta(days=1)
            train_start=date(train_end.year-train_years+1, train_end.month, train_end.day)
            cut_date=valid_end
            items.append({
              "period":period,
              "TRAIN_START":train_start.isoformat(),
              "TRAIN_END":train_end.isoformat(),
              "VALID_START":valid_start.isoformat(),
              "VALID_END":valid_end.isoformat(),
              "TEST_START":test_start.isoformat(),
              "TEST_END":test_end.isoformat(),
              "CUT_DATE":cut_date.isoformat(),
            })
            if y==ey and h==eh: break
            if h==1: h=2
            else: y+=1; h=1

          print(json.dumps({"include":items}, ensure_ascii=False))
          PY

          echo "matrix<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/matrix.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  run:
    # NOTE:
    # - Gate: rolling 유지 (TRAIN_START 기반 + CUT_DATE 컷)
    # - Tail/Tau: expanding (데이터 시작~CUT_DATE까지 컷 후 학습)
    # - BadExit: expanding (이전 반기들에서 누적된 trades pool로만 학습; 현재 반기 trades는 pool에 "학습 후" 추가)
    needs: [raw-data, make-matrix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U pandas pyarrow

      - name: Download raw-data artifact
        uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: data/raw

      - name: Verify raw-data present
        run: |
          ls -la data/raw
          test -f data/raw/prices.parquet -o -f data/raw/prices.csv

      - name: Run walkforward loop (rolling Gate, expanding Tail/Tau/BadExit)
        env:
          MATRIX_JSON: ${{ needs.make-matrix.outputs.matrix }}

          PROFIT_TARGET: ${{ inputs.PROFIT_TARGET }}
          MAX_DAYS: ${{ inputs.MAX_DAYS }}
          STOP_LEVEL: ${{ inputs.STOP_LEVEL }}
          MAX_EXTEND_DAYS: "20"

          P_TAIL_THRESHOLDS: "0.10,0.20,0.30"
          UTILITY_QUANTILES: "0.60,0.75,0.90"
          RANK_METRICS: "utility"
          LAMBDA_TAIL: "1.0"
          GATE_MODES: "tail_utility"
          TRAIL_STOPS: "0.10"
          TP1_FRAC: "0.50"
          ENABLE_TRAILING: "true"
          TOPK_CONFIGS: "1|1.0"
          PS_MINS: "0.00"
          BADEXIT_MAXES: "1.00"
          MAX_LEVERAGE_PCT: "1.0"

          EXCLUDE_TICKERS: ""

          REGIME_MODE: "off"
          REGIME_DD_MAX: "0.20"
          REGIME_RET20_MIN: "0.00"
          REGIME_ATR_MAX: "1.30"
          REGIME_LEVERAGE_MULT: "3.0"

          TAU_SPLIT: ""
          USE_TAU_H: "false"
          ENABLE_DCA: "false"

          WF_TAG_BASE: wf
        shell: bash
        run: |
          set -euo pipefail

          chmod +x scripts/run_walkforward_halfyear.sh

          ensure_universe () {
            if [ -f data/universe.csv ]; then return 0; fi
            echo "[INFO] data/universe.csv missing -> generating from raw prices"
            python - <<'PY'
          from pathlib import Path
          import pandas as pd
          raw_parq = Path("data/raw/prices.parquet")
          raw_csv  = Path("data/raw/prices.csv")
          if raw_parq.exists():
              df = pd.read_parquet(raw_parq)
          elif raw_csv.exists():
              df = pd.read_csv(raw_csv)
          else:
              raise SystemExit("[ERROR] raw prices missing")
          if "Ticker" not in df.columns:
              raise SystemExit("[ERROR] raw prices missing Ticker column")
          ticks = (
              df["Ticker"].astype(str).str.upper().str.strip()
                .dropna().unique().tolist()
          )
          ticks = sorted(set([t for t in ticks if t]))
          out = pd.DataFrame({"Ticker": ticks, "Enabled": True})
          Path("data").mkdir(parents=True, exist_ok=True)
          out.to_csv("data/universe.csv", index=False)
          print(f"[DONE] wrote data/universe.csv tickers={len(out)}")
          PY
          }

          ex_tag () {
            python - <<'PY'
          import os
          pt=float(os.environ["PROFIT_TARGET"])
          h=int(os.environ["MAX_DAYS"])
          sl=float(os.environ["STOP_LEVEL"])
          ex=int(os.environ["MAX_EXTEND_DAYS"])
          pt_i=int(round(pt*100))
          sl_i=int(round(abs(sl)*100))
          print(f"pt{pt_i}_h{h}_sl{sl_i}_ex{ex}")
          PY
          }

          echo "$MATRIX_JSON" > /tmp/matrix.json
          python - <<'PY'
          import json
          m=json.load(open("/tmp/matrix.json","r"))
          assert "include" in m and isinstance(m["include"], list) and m["include"], "matrix include empty"
          print("[OK] periods=", len(m["include"]))
          print("[OK] first=", m["include"][0]["period"], "last=", m["include"][-1]["period"])
          PY

          mkdir -p data/features data/labels data/meta app data/models data/signals/walkforward data/signals/walkforward2
          mkdir -p data/badexit_pool

          python - <<'PY'
          import json, os, glob, subprocess
          from pathlib import Path
          import pandas as pd

          m=json.load(open("/tmp/matrix.json","r"))["include"]

          def sh(cmd, env=None):
              e=os.environ.copy()
              if env: e.update(env)
              print("\n[CMD]\n"+cmd)
              subprocess.check_call(cmd, shell=True, env=e)

          def pick_first(patterns):
              out=[]
              for p in patterns:
                  out += glob.glob(p)
              out = sorted(set(out))
              return out[0] if out else ""

          def cut_by_date_inplace(in_path, cut_date, out_copy=""):
              p=Path(in_path)
              if not p.exists():
                  print(f"[CUT] skip (missing): {p}")
                  return
              cut=pd.to_datetime(cut_date)
              df = pd.read_parquet(p) if p.suffix==".parquet" else pd.read_csv(p)
              if "Date" not in df.columns:
                  print(f"[CUT] no Date column -> skip: {p}")
                  return
              dt = pd.to_datetime(df["Date"], errors="coerce").dt.tz_localize(None)
              df = df.loc[dt.notna()].copy()
              df["Date"] = dt.loc[dt.notna()].values
              before=len(df)
              df = df[df["Date"]<=cut].copy()
              after=len(df)

              if p.suffix==".parquet":
                  df.to_parquet(p, index=False)
              else:
                  df.to_csv(p, index=False)
              print(f"[CUT] {p}: {before} -> {after} (<= {cut.date()})")

              if out_copy:
                  cp=Path(out_copy)
                  cp.parent.mkdir(parents=True, exist_ok=True)
                  if cp.suffix==".parquet":
                      df.to_parquet(cp, index=False)
                  else:
                      df.to_csv(cp, index=False)
                  print(f"[CUT] wrote copy: {cp}")

          for idx, it in enumerate(m):
              period=it["period"]
              env={
                  "WF_PERIOD": period,
                  "TRAIN_START": it["TRAIN_START"],
                  "TRAIN_END": it["TRAIN_END"],
                  "VALID_START": it["VALID_START"],
                  "VALID_END": it["VALID_END"],
                  "TEST_START": it["TEST_START"],
                  "TEST_END": it["TEST_END"],
                  "CUT_DATE": it["CUT_DATE"],
              }

              sh(f'echo "\\n====================\\n[PERIOD] {period} (#{idx+1}/{len(m)})\\n===================="', env=env)
              sh('TAG="wf_${WF_PERIOD}"; echo "[PERIOD] TAG=${TAG}"; echo "TAG=${TAG}" >> $GITHUB_ENV', env=env)
              sh('MODEL_DIR="data/models/wf_${WF_PERIOD}"; mkdir -p "${MODEL_DIR}"; echo "[PERIOD] MODEL_DIR=${MODEL_DIR}"', env=env)

              # universe
              sh('bash -lc \'set -euo pipefail; '
                 'if [ ! -f data/universe.csv ]; then '
                 'echo "[INFO] data/universe.csv missing -> generating from raw prices"; '
                 'python - <<PY2\n'
                 'from pathlib import Path\n'
                 'import pandas as pd\n'
                 'raw_parq = Path("data/raw/prices.parquet")\n'
                 'raw_csv  = Path("data/raw/prices.csv")\n'
                 'if raw_parq.exists(): df = pd.read_parquet(raw_parq)\n'
                 'elif raw_csv.exists(): df = pd.read_csv(raw_csv)\n'
                 'else: raise SystemExit("[ERROR] raw prices missing")\n'
                 'if "Ticker" not in df.columns: raise SystemExit("[ERROR] raw prices missing Ticker column")\n'
                 'ticks = df["Ticker"].astype(str).str.upper().str.strip().dropna().unique().tolist()\n'
                 'ticks = sorted(set([t for t in ticks if t]))\n'
                 'out = pd.DataFrame({"Ticker": ticks, "Enabled": True})\n'
                 'Path("data").mkdir(parents=True, exist_ok=True)\n'
                 'out.to_csv("data/universe.csv", index=False)\n'
                 'print(f"[DONE] wrote data/universe.csv tickers={len(out)}")\n'
                 'PY2\n'
                 'fi\'', env=env)

              # features
              sh('python scripts/build_features.py', env=env)

              # -------------------------
              # Gate labels: rolling (TRAIN_START)
              # -------------------------
              sh('bash -lc \'set -euo pipefail; '
                 'python scripts/build_labels.py '
                 '--profit-target "${PROFIT_TARGET}" '
                 '--max-days "${MAX_DAYS}" '
                 '--stop-level "${STOP_LEVEL}" '
                 '--start-date "${TRAIN_START}"\'', env=env)

              # -------------------------
              # Tail labels: build full then CUT expanding<=CUT_DATE (NO lookahead)
              # -------------------------
              sh('bash -lc \'set -euo pipefail; '
                 'python scripts/build_tail_labels.py '
                 '--profit-target "${PROFIT_TARGET}" '
                 '--max-days "${MAX_DAYS}" '
                 '--stop-level "${STOP_LEVEL}" '
                 '--max-extend-days "${MAX_EXTEND_DAYS}"\'', env=env)

              TAG=f"wf_{period}"
              cut=it["CUT_DATE"]

              tail_path = pick_first([
                  "data/labels/labels_tail*.parquet",
                  "data/labels/labels_tail*.csv",
                  "data/labels/*tail*labels*.parquet",
                  "data/labels/*tail*labels*.csv",
              ])
              if tail_path:
                  out_copy = f"data/labels/labels_tail_{TAG}" + (".parquet" if tail_path.endswith(".parquet") else ".csv")
                  print(f"[TAIL] labels_path={tail_path}")
                  cut_by_date_inplace(tail_path, cut, out_copy)

              # -------------------------
              # Tau labels: build tagged then CUT expanding<=CUT_DATE (NO lookahead)
              # -------------------------
              sh('bash -lc \'set -euo pipefail; '
                 'TAG="wf_${WF_PERIOD}"; '
                 'python scripts/build_tau_labels.py '
                 '--tag "${TAG}" '
                 '--profit-target "${PROFIT_TARGET}" '
                 '--max-days "${MAX_DAYS}" '
                 '--stop-level "${STOP_LEVEL}" '
                 '--max-extend-days "${MAX_EXTEND_DAYS}"\'', env=env)

              tau_path = pick_first([
                  f"data/labels/*tau*{TAG}*.parquet",
                  f"data/labels/*tau*{TAG}*.csv",
                  f"data/labels/labels_tau_{TAG}.parquet",
                  f"data/labels/labels_tau_{TAG}.csv",
              ])
              if tau_path:
                  out_copy = f"data/labels/labels_tau_{TAG}" + (".parquet" if tau_path.endswith(".parquet") else ".csv")
                  print(f"[TAU] labels_path={tau_path}")
                  cut_by_date_inplace(tau_path, cut, out_copy)

              # -------------------------
              # Gate features/labels CUT <= CUT_DATE (rolling gate only)
              # -------------------------
              sh('bash -lc \'set -euo pipefail; '
                 'TAG="wf_${WF_PERIOD}"; CUT_DATE="${CUT_DATE}"; '
                 'TAG="${TAG}" CUT_DATE="${CUT_DATE}" python - <<PY7\n'
                 'import os\n'
                 'from pathlib import Path\n'
                 'import pandas as pd\n'
                 'TAG=os.environ["TAG"]\n'
                 'CUT=pd.to_datetime(os.environ["CUT_DATE"])\n'
                 'def read_any(parq, csv):\n'
                 '  if Path(parq).exists(): return pd.read_parquet(parq)\n'
                 '  if Path(csv).exists(): return pd.read_csv(csv)\n'
                 '  raise FileNotFoundError(f"missing {parq} or {csv}")\n'
                 'def write_parq(df,p):\n'
                 '  Path(p).parent.mkdir(parents=True, exist_ok=True)\n'
                 '  df.to_parquet(p, index=False)\n'
                 'f=read_any("data/features/features_model.parquet","data/features/features_model.csv")\n'
                 'f["Date"]=pd.to_datetime(f["Date"], errors="coerce").dt.tz_localize(None)\n'
                 'f=f.dropna(subset=["Date"])\n'
                 'f_cut=f[f["Date"]<=CUT].copy()\n'
                 'write_parq(f_cut,"data/features/features_model.parquet")\n'
                 'write_parq(f_cut,f"data/features/features_model_{TAG}.parquet")\n'
                 'print("[CUT] features_model rows=", len(f_cut))\n'
                 'lm=read_any("data/labels/labels_model.parquet","data/labels/labels_model.csv")\n'
                 'lm["Date"]=pd.to_datetime(lm["Date"], errors="coerce").dt.tz_localize(None)\n'
                 'lm=lm.dropna(subset=["Date"])\n'
                 'lm_cut=lm[lm["Date"]<=CUT].copy()\n'
                 'write_parq(lm_cut,"data/labels/labels_model.parquet")\n'
                 'write_parq(lm_cut,f"data/labels/labels_model_{TAG}.parquet")\n'
                 'print("[CUT] labels_model rows=", len(lm_cut))\n'
                 'PY7\'', env=env)

              # -------------------------
              # Train Gate / Tail / Tau
              # -------------------------
              sh('bash -lc \'set -euo pipefail; TAG="wf_${WF_PERIOD}"; '
                 'echo "[TRAIN] python scripts/train_model.py --tag ${TAG}"; '
                 'python scripts/train_model.py --tag "${TAG}"\'', env=env)

              sh('bash -lc \'set -euo pipefail; '
                 'echo "[TRAIN] python scripts/train_tail_model.py"; '
                 'python scripts/train_tail_model.py '
                 '--profit-target "${PROFIT_TARGET}" '
                 '--max-days "${MAX_DAYS}" '
                 '--stop-level "${STOP_LEVEL}" '
                 '--max-extend-days "${MAX_EXTEND_DAYS}"\'', env=env)

              sh('bash -lc \'set -euo pipefail; TAG="wf_${WF_PERIOD}"; '
                 'echo "[TRAIN] python scripts/train_tau_model.py --tag ${TAG}"; '
                 'python scripts/train_tau_model.py --tag "${TAG}"\'', env=env)

              # Stage models
              sh('bash -lc \'set -euo pipefail; '
                 'TAG="wf_${WF_PERIOD}"; MODEL_DIR="data/models/${TAG}"; mkdir -p "${MODEL_DIR}"; '
                 'pick_one () { local pat="$1"; local f; f="$(ls -1 ${pat} 2>/dev/null | head -n 1 || true)"; echo "${f}"; }\n'
                 'echo "[TRAIN] produced app/:"; ls -la app | sed -n "1,200p";\n'
                 'mf="$(pick_one "app/model_*${TAG}*.pkl")"; sf="$(pick_one "app/scaler_*${TAG}*.pkl")";\n'
                 'test -n "${mf}"; test -n "${sf}";\n'
                 'cp -v "${mf}" "${MODEL_DIR}/model.pkl";\n'
                 'cp -v "${sf}" "${MODEL_DIR}/scaler.pkl";\n'
                 'test -f app/tail_model.pkl; test -f app/tail_scaler.pkl;\n'
                 'cp -v app/tail_model.pkl "${MODEL_DIR}/tail_model.pkl";\n'
                 'cp -v app/tail_scaler.pkl "${MODEL_DIR}/tail_scaler.pkl";\n'
                 'taum="$(pick_one "app/tau_model_*${TAG}*.pkl app/tau_model.pkl")";\n'
                 'taus="$(pick_one "app/tau_scaler_*${TAG}*.pkl app/tau_scaler.pkl")";\n'
                 'test -n "${taum}"; test -n "${taus}";\n'
                 'cp -v "${taum}" "${MODEL_DIR}/tau_model.pkl";\n'
                 'cp -v "${taus}" "${MODEL_DIR}/tau_scaler.pkl";\n'
                 'echo "[TRAIN] staged in ${MODEL_DIR}:"; ls -la "${MODEL_DIR}" | sed -n "1,200p";\n'
                 'test -f "${MODEL_DIR}/model.pkl"; test -f "${MODEL_DIR}/scaler.pkl";\n'
                 'test -f "${MODEL_DIR}/tail_model.pkl"; test -f "${MODEL_DIR}/tail_scaler.pkl";\n'
                 'test -f "${MODEL_DIR}/tau_model.pkl"; test -f "${MODEL_DIR}/tau_scaler.pkl";\n'
                 'echo "[TRAIN DONE] gate(rolling) + tail/tau(expanding<=CUT) ready"\'', env=env)

              # Walkforward #1
              sh('bash -lc \'set -euo pipefail; '
                 'WF_PERIOD="${WF_PERIOD}"; '
                 'MODEL_DIR="data/models/wf_${WF_PERIOD}"; '
                 'export WF_PERIOD TRAIN_START TRAIN_END VALID_START VALID_END TEST_START TEST_END CUT_DATE;\n'
                 'export PROFIT_TARGET MAX_DAYS STOP_LEVEL;\n'
                 'export P_TAIL_THRESHOLDS UTILITY_QUANTILES RANK_METRICS LAMBDA_TAIL GATE_MODES TRAIL_STOPS TP1_FRAC ENABLE_TRAILING TOPK_CONFIGS PS_MINS BADEXIT_MAXES MAX_LEVERAGE_PCT;\n'
                 'export EXCLUDE_TICKERS REGIME_MODE REGIME_DD_MAX REGIME_RET20_MIN REGIME_ATR_MAX REGIME_LEVERAGE_MULT TAU_SPLIT USE_TAU_H ENABLE_DCA;\n'
                 'export MODEL_DIR;\n'
                 'export REQUIRE_FILES="data/models/wf_${WF_PERIOD}/model.pkl,data/models/wf_${WF_PERIOD}/scaler.pkl,data/models/wf_${WF_PERIOD}/tail_model.pkl,data/models/wf_${WF_PERIOD}/tail_scaler.pkl,data/models/wf_${WF_PERIOD}/tau_model.pkl,data/models/wf_${WF_PERIOD}/tau_scaler.pkl";\n'
                 'export OUT_DIR_BASE="data/signals/walkforward";\n'
                 'export WF_TAG_BASE="wf";\n'
                 'echo "[RUN1] MODEL_DIR=${MODEL_DIR}"; ls -la "${MODEL_DIR}" | sed -n "1,200p";\n'
                 './scripts/run_walkforward_halfyear.sh;\n'
                 'echo "[RUN1] done. signals: data/signals/walkforward/${WF_PERIOD}"; ls -la "data/signals/walkforward/${WF_PERIOD}" | sed -n "1,200p" || true\'', env=env)

              # BadExit expanding (past-only pool)
              sh('bash -lc \'set -euo pipefail; '
                 'WF_PERIOD="${WF_PERIOD}"; TAG="wf_${WF_PERIOD}"; MODEL_DIR="data/models/${TAG}";\n'
                 'POOL="data/badexit_pool"; mkdir -p "${POOL}";\n'
                 'echo "[BADEXIT-EXP] pool dir=${POOL}";\n'
                 'echo "[BADEXIT-EXP] pool files count=$(find "${POOL}" -type f -name "sim_engine_trades_*" | wc -l | tr -d " ")";\n'
                 'if [ "$(find "${POOL}" -type f -name "sim_engine_trades_*" | wc -l | tr -d " ")" = "0" ]; then\n'
                 '  echo "[BADEXIT-EXP] pool empty -> skip badexit training for ${TAG} (no lookahead).";\n'
                 '  echo "BADEXIT_AVAILABLE=false" >> $GITHUB_ENV;\n'
                 'else\n'
                 '  echo "BADEXIT_AVAILABLE=true" >> $GITHUB_ENV;\n'
                 '  EX_TAG="$(python - <<PYX\n'
                 'import os\n'
                 'pt=float(os.environ["PROFIT_TARGET"])\n'
                 'h=int(os.environ["MAX_DAYS"])\n'
                 'sl=float(os.environ["STOP_LEVEL"])\n'
                 'ex=int(os.environ["MAX_EXTEND_DAYS"])\n'
                 'pt_i=int(round(pt*100)); sl_i=int(round(abs(sl)*100))\n'
                 'print(f"pt{pt_i}_h{h}_sl{sl_i}_ex{ex}")\n'
                 'PYX\n'
                 ')";\n'
                 '  echo "[BADEXIT-EXP] EX_TAG=${EX_TAG}";\n'
                 '  SIGNALS_DIR="${POOL}" EX_TAG="${EX_TAG}" python - <<PY1\n'
                 'import os, glob\n'
                 'import pandas as pd\n'
                 'd=os.environ["SIGNALS_DIR"]; ex=os.environ["EX_TAG"]\n'
                 'files=sorted(set(glob.glob(os.path.join(d,f"sim_engine_trades_{ex}__*.parquet")) + glob.glob(os.path.join(d,f"sim_engine_trades_{ex}__*.csv"))))\n'
                 'print(f"[CHECK-1C] SIGNALS_DIR={d}")\n'
                 'print(f"[CHECK-1C] EX_TAG={ex}")\n'
                 'print(f"[CHECK-1C] matched files={len(files)}")\n'
                 'total=0\n'
                 'shown=0\n'
                 'for f in files:\n'
                 '  try:\n'
                 '    df=pd.read_parquet(f) if f.endswith(".parquet") else pd.read_csv(f)\n'
                 '    n=len(df)\n'
                 '  except Exception as e:\n'
                 '    print(f"[CHECK-1C] read_fail file={f} err={e}")\n'
                 '    continue\n'
                 '  total += n\n'
                 '  if shown < 10:\n'
                 '    print(f"[CHECK-1C] rows={n} file={f}")\n'
                 '    shown += 1\n'
                 'print(f"[CHECK-1C] matched rows total={total}")\n'
                 'PY1\n'
                 '  python scripts/build_badexit_labels.py \\\n'
                 '    --profit-target "${PROFIT_TARGET}" \\\n'
                 '    --max-days "${MAX_DAYS}" \\\n'
                 '    --stop-level "${STOP_LEVEL}" \\\n'
                 '    --max-extend-days "${MAX_EXTEND_DAYS}" \\\n'
                 '    --signals-dir "${POOL}" \\\n'
                 '    --also-read-csv;\n'
                 '  pick_one () { local pat="$1"; local f; f="$(ls -1 ${pat} 2>/dev/null | head -n 1 || true)"; echo "${f}"; }\n'
                 '  badlbl="$(pick_one "data/labels/labels_badexit_${EX_TAG}.parquet data/labels/labels_badexit_${EX_TAG}.csv data/labels/labels_badexit_*.parquet data/labels/labels_badexit_*.csv")";\n'
                 '  if [ -z "${badlbl}" ]; then echo "[ERROR] badexit labels not found"; ls -la data/labels | sed -n "1,200p"; exit 1; fi\n'
                 '  echo "[BADEXIT] labels=${badlbl}";\n'
                 '  LABEL_COL="$(BADLBL="${badlbl}" python - <<PY2\n'
                 'import os\n'
                 'import pandas as pd\n'
                 'from pathlib import Path\n'
                 'p=Path(os.environ["BADLBL"])\n'
                 'df=pd.read_parquet(p) if p.suffix==".parquet" else pd.read_csv(p)\n'
                 'cols=list(df.columns)\n'
                 'cands=["y_badexit","BadExit","badexit","is_badexit","label","target"]\n'
                 'for c in cands:\n'
                 '  if c in cols:\n'
                 '    print(c); raise SystemExit(0)\n'
                 'print("__MISSING__")\n'
                 'print("COLS=" + ",".join(cols))\n'
                 'PY2\n'
                 '  )";\n'
                 '  if [ "${LABEL_COL}" = "__MISSING__" ]; then echo "[ERROR] label col missing"; exit 1; fi\n'
                 '  echo "[BADEXIT] detected label_col=${LABEL_COL}";\n'
                 '  BADLBL="${badlbl}" LABEL_COL="${LABEL_COL}" python - <<PY3\n'
                 'import os\n'
                 'import pandas as pd\n'
                 'from pathlib import Path\n'
                 'p=Path(os.environ["BADLBL"]); lab=os.environ["LABEL_COL"]\n'
                 'df=pd.read_parquet(p) if p.suffix==".parquet" else pd.read_csv(p)\n'
                 'print(f"[CHECK-2B] labels_path={p}")\n'
                 'print(f"[CHECK-2B] rows={len(df)} cols={len(df.columns)}")\n'
                 'if "Ticker" in df.columns: print(f"[CHECK-2B] nunique(Ticker)={df[\"Ticker\"].nunique()}")\n'
                 'if "Date" in df.columns: print(f"[CHECK-2B] nunique(Date)={df[\"Date\"].nunique()}")\n'
                 'vc=df[lab].value_counts(dropna=False)\n'
                 'print(f"[CHECK-2B] value_counts for {lab}")\n'
                 'print(vc.to_string())\n'
                 'try:\n'
                 '  s=pd.to_numeric(df[lab], errors="coerce")\n'
                 '  if s.notna().all() and set(s.unique()).issubset({0,1}):\n'
                 '    print(f"[CHECK-2B] pos_rate={float(s.mean()):.6f}")\n'
                 'except Exception:\n'
                 '  pass\n'
                 'PY3\n'
                 '  python scripts/train_badexit_model_wf_lite.py \\\n'
                 '    --data-path "${badlbl}" \\\n'
                 '    --label-col "${LABEL_COL}" \\\n'
                 '    --out-model "app/badexit_model_${TAG}.pkl" \\\n'
                 '    --out-scaler "app/badexit_scaler_${TAG}.pkl" \\\n'
                 '    --out-report "data/meta/train_badexit_report_${TAG}.json";\n'
                 '  test -f "app/badexit_model_${TAG}.pkl"; test -f "app/badexit_scaler_${TAG}.pkl";\n'
                 '  cp -v "app/badexit_model_${TAG}.pkl" "${MODEL_DIR}/badexit_model.pkl";\n'
                 '  cp -v "app/badexit_scaler_${TAG}.pkl" "${MODEL_DIR}/badexit_scaler.pkl";\n'
                 '  echo "[BADEXIT] staged in ${MODEL_DIR}:"; ls -la "${MODEL_DIR}" | sed -n "1,200p";\n'
                 'fi\'', env=env)

              # Walkforward #2 (with badexit) else copy wf1 -> wf2
              sh('bash -lc \'set -euo pipefail; '
                 'WF_PERIOD="${WF_PERIOD}"; TAG="wf_${WF_PERIOD}"; MODEL_DIR="data/models/${TAG}";\n'
                 'if [ "${BADEXIT_AVAILABLE:-false}" != "true" ]; then\n'
                 '  echo "[RUN2] skip (no badexit model). Copy walkforward -> walkforward2 for ${WF_PERIOD}";\n'
                 '  mkdir -p "data/signals/walkforward2/${WF_PERIOD}";\n'
                 '  rsync -a "data/signals/walkforward/${WF_PERIOD}/" "data/signals/walkforward2/${WF_PERIOD}/" || true;\n'
                 'else\n'
                 '  export WF_PERIOD TRAIN_START TRAIN_END VALID_START VALID_END TEST_START TEST_END CUT_DATE;\n'
                 '  export PROFIT_TARGET MAX_DAYS STOP_LEVEL;\n'
                 '  export P_TAIL_THRESHOLDS UTILITY_QUANTILES RANK_METRICS LAMBDA_TAIL GATE_MODES TRAIL_STOPS TP1_FRAC ENABLE_TRAILING TOPK_CONFIGS PS_MINS BADEXIT_MAXES MAX_LEVERAGE_PCT;\n'
                 '  export EXCLUDE_TICKERS REGIME_MODE REGIME_DD_MAX REGIME_RET20_MIN REGIME_ATR_MAX REGIME_LEVERAGE_MULT TAU_SPLIT USE_TAU_H ENABLE_DCA;\n'
                 '  export MODEL_DIR;\n'
                 '  export REQUIRE_FILES="data/models/wf_${WF_PERIOD}/model.pkl,data/models/wf_${WF_PERIOD}/scaler.pkl,data/models/wf_${WF_PERIOD}/tail_model.pkl,data/models/wf_${WF_PERIOD}/tail_scaler.pkl,data/models/wf_${WF_PERIOD}/tau_model.pkl,data/models/wf_${WF_PERIOD}/tau_scaler.pkl,data/models/wf_${WF_PERIOD}/badexit_model.pkl,data/models/wf_${WF_PERIOD}/badexit_scaler.pkl";\n'
                 '  export OUT_DIR_BASE="data/signals/walkforward2";\n'
                 '  export WF_TAG_BASE="wf";\n'
                 '  echo "[RUN2] MODEL_DIR=${MODEL_DIR}"; ls -la "${MODEL_DIR}" | sed -n "1,200p";\n'
                 '  ./scripts/run_walkforward_halfyear.sh;\n'
                 'fi\n'
                 'echo "[RUN2] done. signals: data/signals/walkforward2/${WF_PERIOD}"; ls -la "data/signals/walkforward2/${WF_PERIOD}" | sed -n "1,200p" || true\'', env=env)

              # add current period trades into pool AFTER training (past-only for next periods)
              sh('bash -lc \'set -euo pipefail; '
                 'WF_PERIOD="${WF_PERIOD}"; '
                 'SIGNALS_DIR="data/signals/walkforward/${WF_PERIOD}"; '
                 'POOL="data/badexit_pool"; '
                 'EX_TAG="$(python - <<PYX\n'
                 'import os\n'
                 'pt=float(os.environ["PROFIT_TARGET"])\n'
                 'h=int(os.environ["MAX_DAYS"])\n'
                 'sl=float(os.environ["STOP_LEVEL"])\n'
                 'ex=int(os.environ["MAX_EXTEND_DAYS"])\n'
                 'pt_i=int(round(pt*100)); sl_i=int(round(abs(sl)*100))\n'
                 'print(f"pt{pt_i}_h{h}_sl{sl_i}_ex{ex}")\n'
                 'PYX\n'
                 ')";\n'
                 'echo "[POOL] add wf1 trades of ${WF_PERIOD} to pool (for next periods), EX_TAG=${EX_TAG}";\n'
                 'shopt -s nullglob;\n'
                 'mkdir -p "${POOL}";\n'
                 'n=0;\n'
                 'for f in "${SIGNALS_DIR}"/sim_engine_trades_*.csv "${SIGNALS_DIR}"/sim_engine_trades_*.parquet; do\n'
                 '  base="$(basename "$f")";\n'
                 '  out="${POOL}/sim_engine_trades_${EX_TAG}__${WF_PERIOD}__${base}";\n'
                 '  if [ ! -f "${out}" ]; then cp -v "$f" "${out}"; n=$((n+1)); fi\n'
                 'done\n'
                 'echo "[POOL] copied ${n} files. pool now=$(find "${POOL}" -type f -name "sim_engine_trades_*" | wc -l | tr -d " ")"\'', env=env)

          PY

          echo "[DONE] all periods processed."
          echo "[TREE] signals walkforward:"
          find data/signals/walkforward -maxdepth 2 -type d | sed -n '1,200p' || true
          echo "[TREE] signals walkforward2:"
          find data/signals/walkforward2 -maxdepth 2 -type d | sed -n '1,200p' || true

      - name: Upload artifact (walkforward all)
        uses: actions/upload-artifact@v4
        with:
          name: walkforward_all
          path: data/signals/walkforward
          if-no-files-found: error

      - name: Upload artifact (walkforward2 all)
        uses: actions/upload-artifact@v4
        with:
          name: walkforward2_all
          path: data/signals/walkforward2
          if-no-files-found: error

      - name: Upload artifact (features_scored all)
        uses: actions/upload-artifact@v4
        with:
          name: features_scored_all
          path: |
            data/signals/walkforward/*/_inputs/features_scored.csv
            data/signals/walkforward/*/_inputs/features_scored.parquet
            data/signals/walkforward2/*/_inputs/features_scored.csv
            data/signals/walkforward2/*/_inputs/features_scored.parquet
          if-no-files-found: warn

  aggregate:
    name: aggregate-walkforward
    needs: [run]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (aggregate)
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U pandas pyarrow

      - name: Download walkforward_all artifact
        uses: actions/download-artifact@v4
        with:
          name: walkforward_all
          path: _wf_all

      - name: Rebuild expected folder structure (#1)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data/signals/walkforward
          rsync -a "_wf_all/" "data/signals/walkforward/"
          echo "[INFO] final tree:"
          find data/signals/walkforward -maxdepth 2 -type d | sed -n '1,200p'
          test "$(find data/signals/walkforward -mindepth 1 -maxdepth 1 -type d | wc -l)" -ge 1

      - name: Aggregate metrics across periods
        run: |
          set -euo pipefail
          python scripts/aggregate_walkforward_halfyear.py \
            --root data/signals/walkforward \
            --out data/signals/walkforward/_summary_walkforward.csv

          ls -la data/signals/walkforward | sed -n '1,200p'
          test -f data/signals/walkforward/_summary_walkforward.csv

      - name: Analyze summary (rank configs)
        run: |
          set -euo pipefail
          python scripts/analyze_walkforward_summary.py \
            --summary data/signals/walkforward/_summary_walkforward.csv \
            --out data/signals/walkforward/_analysis_walkforward.csv

          ls -la data/signals/walkforward | sed -n '1,200p'
          test -f data/signals/walkforward/_analysis_walkforward.csv

      - name: Upload artifact (walkforward summary)
        uses: actions/upload-artifact@v4
        with:
          name: walkforward_summary
          path: |
            data/signals/walkforward/_summary_walkforward.csv
            data/signals/walkforward/_analysis_walkforward.csv
          if-no-files-found: error