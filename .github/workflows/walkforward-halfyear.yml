name: walkforward-halfyear

on:
  workflow_dispatch:
    inputs:
      wf_start:
        description: "first half-year (e.g. 2018H1)"
        required: true
        default: "2018H1"
      wf_end:
        description: "last half-year (e.g. 2025H2)"
        required: true
        default: "2025H2"
      train_years:
        description: "train window in years (e.g. 12)"
        required: true
        default: "12"

      PROFIT_TARGET:
        description: "profit target (e.g. 0.10)"
        required: true
        default: "0.10"
      MAX_DAYS:
        description: "max holding days H (e.g. 40)"
        required: true
        default: "40"
      STOP_LEVEL:
        description: "stop level (e.g. -0.10)"
        required: true
        default: "-0.10"

jobs:
  raw-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (raw-data)
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U yfinance pandas pyarrow

      - name: Build universe.csv (if missing)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data
          if [ ! -f data/universe.csv ]; then
            echo "[INFO] data/universe.csv missing -> generating via scripts/universe.py"
            python scripts/universe.py
          fi
          ls -la data | sed -n '1,200p'
          test -f data/universe.csv

      - name: Fetch raw prices (Yahoo)
        env:
          MAX_YEARS: "16"
        run: |
          set -euo pipefail
          mkdir -p data/raw
          python scripts/fetch_prices.py --include-extra
          ls -la data/raw
          test -f data/raw/prices.parquet -o -f data/raw/prices.csv

      - name: Upload artifact raw-data
        uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: data/raw
          if-no-files-found: error

  make-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Generate half-year matrix JSON
        id: gen
        shell: bash
        run: |
          python - <<'PY' > /tmp/matrix.json
          import json, re
          from datetime import date, timedelta

          wf_start = "${{ inputs.wf_start }}".strip()
          wf_end   = "${{ inputs.wf_end }}".strip()
          train_years = int("${{ inputs.train_years }}")

          m = re.fullmatch(r"(\d{4})H([12])", wf_start)
          n = re.fullmatch(r"(\d{4})H([12])", wf_end)
          if not m or not n:
            raise SystemExit("wf_start/wf_end must be like 2018H1")

          sy, sh = int(m.group(1)), int(m.group(2))
          ey, eh = int(n.group(1)), int(n.group(2))

          def half_start(y,h): return date(y,1,1) if h==1 else date(y,7,1)
          def half_end(y,h):   return date(y,6,30) if h==1 else date(y,12,31)

          items=[]
          y,h=sy,sh
          while True:
            period=f"{y}H{h}"
            test_start=half_start(y,h); test_end=half_end(y,h)
            vy,vh=(y-1,2) if h==1 else (y,1)
            valid_start=half_start(vy,vh); valid_end=half_end(vy,vh)
            train_end=valid_start - timedelta(days=1)
            train_start=date(train_end.year-train_years+1, train_end.month, train_end.day)
            cut_date=valid_end
            items.append({
              "period":period,
              "TRAIN_START":train_start.isoformat(),
              "TRAIN_END":train_end.isoformat(),
              "VALID_START":valid_start.isoformat(),
              "VALID_END":valid_end.isoformat(),
              "TEST_START":test_start.isoformat(),
              "TEST_END":test_end.isoformat(),
              "CUT_DATE":cut_date.isoformat(),
            })
            if y==ey and h==eh: break
            if h==1: h=2
            else: y+=1; h=1

          print(json.dumps({"include":items}, ensure_ascii=False))
          PY

          echo "matrix<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/matrix.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  run:
    # NOTE:
    # - Gate: rolling 유지 (TRAIN_START 기반 + CUT_DATE 컷)
    # - Tail/Tau: expanding (데이터 시작~CUT_DATE까지 컷 후 학습)
    # - BadExit: expanding (이전 반기들에서 누적된 trades pool로만 학습; 현재 반기 trades는 pool에 "학습 후" 추가)
    needs: [raw-data, make-matrix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U pandas pyarrow

      - name: Download raw-data artifact
        uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: data/raw

      - name: Verify raw-data present
        run: |
          ls -la data/raw
          test -f data/raw/prices.parquet -o -f data/raw/prices.csv

      - name: Run walkforward loop (rolling Gate, expanding Tail/Tau/BadExit)
        env:
          MATRIX_JSON: ${{ needs.make-matrix.outputs.matrix }}

          PROFIT_TARGET: ${{ inputs.PROFIT_TARGET }}
          MAX_DAYS: ${{ inputs.MAX_DAYS }}
          STOP_LEVEL: ${{ inputs.STOP_LEVEL }}
          MAX_EXTEND_DAYS: "20"

          P_TAIL_THRESHOLDS: "0.10,0.20,0.30"
          UTILITY_QUANTILES: "0.60,0.75,0.90"
          RANK_METRICS: "utility"
          LAMBDA_TAIL: "1.0"
          GATE_MODES: "tail_utility"
          TRAIL_STOPS: "0.10"
          TP1_FRAC: "0.50"
          ENABLE_TRAILING: "true"
          TOPK_CONFIGS: "1|1.0"
          PS_MINS: "0.00"
          BADEXIT_MAXES: "1.00"
          MAX_LEVERAGE_PCT: "1.0"

          EXCLUDE_TICKERS: ""

          REGIME_MODE: "off"
          REGIME_DD_MAX: "0.20"
          REGIME_RET20_MIN: "0.00"
          REGIME_ATR_MAX: "1.30"
          REGIME_LEVERAGE_MULT: "3.0"

          TAU_SPLIT: ""
          USE_TAU_H: "false"
          ENABLE_DCA: "false"

          WF_TAG_BASE: wf
        shell: bash
        run: |
          set -euo pipefail

          chmod +x scripts/run_walkforward_halfyear.sh

          echo "$MATRIX_JSON" > /tmp/matrix.json
          python - <<'PY'
          import json
          m=json.load(open("/tmp/matrix.json","r"))
          assert "include" in m and isinstance(m["include"], list) and m["include"], "matrix include empty"
          print("[OK] periods=", len(m["include"]))
          print("[OK] first=", m["include"][0]["period"], "last=", m["include"][-1]["period"])
          for i,it in enumerate(m["include"], start=1):
              print(f"[PLAN] {i:02d} {it['period']}  train={it['TRAIN_START']}..{it['TRAIN_END']}  cut={it['CUT_DATE']}  test={it['TEST_START']}..{it['TEST_END']}")
          PY

          mkdir -p data/features data/labels data/meta app
          mkdir -p data/models data/signals/walkforward data/signals/walkforward2
          mkdir -p data/badexit_pool

          pick_one () {
            local pat="$1"
            local f
            f="$(ls -1 ${pat} 2>/dev/null | head -n 1 || true)"
            echo "${f}"
          }

          ensure_universe () {
            if [ -f data/universe.csv ]; then return 0; fi
            echo "[INFO] data/universe.csv missing -> generating from raw prices"
            python - <<'PY'
          from pathlib import Path
          import pandas as pd
          raw_parq = Path("data/raw/prices.parquet")
          raw_csv  = Path("data/raw/prices.csv")
          if raw_parq.exists():
              df = pd.read_parquet(raw_parq)
          elif raw_csv.exists():
              df = pd.read_csv(raw_csv)
          else:
              raise SystemExit("[ERROR] raw prices missing")
          if "Ticker" not in df.columns:
              raise SystemExit("[ERROR] raw prices missing Ticker column")
          ticks = (
              df["Ticker"].astype(str).str.upper().str.strip()
                .dropna().unique().tolist()
          )
          ticks = sorted(set([t for t in ticks if t]))
          out = pd.DataFrame({"Ticker": ticks, "Enabled": True})
          Path("data").mkdir(parents=True, exist_ok=True)
          out.to_csv("data/universe.csv", index=False)
          print(f"[DONE] wrote data/universe.csv tickers={len(out)}")
          PY
          }

          ex_tag () {
            python - <<'PY'
          import os
          pt=float(os.environ["PROFIT_TARGET"])
          h=int(os.environ["MAX_DAYS"])
          sl=float(os.environ["STOP_LEVEL"])
          ex=int(os.environ["MAX_EXTEND_DAYS"])
          pt_i=int(round(pt*100))
          sl_i=int(round(abs(sl)*100))
          print(f"pt{pt_i}_h{h}_sl{sl_i}_ex{ex}")
          PY
          }

          cut_file_inplace_by_date () {
            # args: IN_PATH CUT_DATE OUT_COPY(optional)
            local p="$1"
            local cut="$2"
            local copy="${3:-}"
            if [ -z "${p}" ] || [ ! -f "${p}" ]; then
              echo "[CUT] skip (missing): ${p}"
              return 0
            fi
            IN_PATH="${p}" CUT_DATE="${cut}" OUT_COPY="${copy}" python - <<'PY'
          import os
          import pandas as pd
          from pathlib import Path

          p = Path(os.environ["IN_PATH"])
          cut = pd.to_datetime(os.environ["CUT_DATE"])
          out_copy = os.environ.get("OUT_COPY","").strip()

          df = pd.read_parquet(p) if p.suffix==".parquet" else pd.read_csv(p)

          if "Date" not in df.columns:
              print(f"[CUT] no Date column -> skip: {p}")
              raise SystemExit(0)

          dt = pd.to_datetime(df["Date"], errors="coerce").dt.tz_localize(None)
          df = df.loc[dt.notna()].copy()
          df["Date"] = dt.loc[dt.notna()].values

          before=len(df)
          df = df[df["Date"] <= cut].copy()
          after=len(df)

          if p.suffix==".parquet":
              df.to_parquet(p, index=False)
          else:
              df.to_csv(p, index=False)

          print(f"[CUT] {p}: {before} -> {after} (<= {cut.date()})")

          if out_copy:
              cp = Path(out_copy)
              cp.parent.mkdir(parents=True, exist_ok=True)
              if cp.suffix==".parquet":
                  df.to_parquet(cp, index=False)
              else:
                  df.to_csv(cp, index=False)
              print(f"[CUT] wrote copy: {cp}")
          PY
          }

          summarize_labels () {
            TAG="$1"
            python - <<'PY'
          import os, glob
          from pathlib import Path
          import pandas as pd

          TAG = os.environ["TAG"]

          def read_any(p):
              p = Path(p)
              if not p.exists(): return None
              return pd.read_parquet(p) if p.suffix==".parquet" else pd.read_csv(p)

          def pick(globs_):
              out=[]
              for g in globs_:
                  out += glob.glob(g)
              out = sorted(set(out))
              return out[0] if out else ""

          def summarize(df, label_candidates, name):
              if df is None:
                  print(f"[CHK-MDL] {name}: MISSING")
                  return
              cols = list(df.columns)
              lab = None
              for c in label_candidates:
                  if c in cols:
                      lab = c
                      break
              print(f"[CHK-MDL] {name}: rows={len(df)} cols={len(cols)} label_col={lab}")
              if lab is not None:
                  vc = df[lab].value_counts(dropna=False)
                  print(f"[CHK-MDL] {name}: value_counts({lab}) top:")
                  print(vc.head(10).to_string())
                  try:
                      s = pd.to_numeric(df[lab], errors="coerce")
                      if s.notna().all() and set(s.unique()).issubset({0,1}):
                          print(f"[CHK-MDL] {name}: pos_rate={float(s.mean()):.6f}")
                  except Exception:
                      pass

          gate_path = pick([f"data/labels/labels_model_{TAG}.parquet", f"data/labels/labels_model_{TAG}.csv"])
          tail_path = pick(["data/labels/labels_tail*.parquet","data/labels/labels_tail*.csv","data/labels/*tail*labels*.parquet","data/labels/*tail*labels*.csv"])
          tau_path  = pick([f"data/labels/*tau*{TAG}*.parquet", f"data/labels/*tau*{TAG}*.csv", f"data/labels/labels_tau_{TAG}.parquet", f"data/labels/labels_tau_{TAG}.csv"])

          summarize(read_any(gate_path) if gate_path else None, ["y","Y","label","target","p_success","p","success","y_success"], f"GATE labels ({gate_path or 'missing'})")
          summarize(read_any(tail_path) if tail_path else None, ["y_tail","tail","label","target","p_tail"], f"TAIL labels ({tail_path or 'missing'})")
          summarize(read_any(tau_path)  if tau_path  else None, ["y_tau","tau","label","target","H","tau_h"], f"TAU labels ({tau_path or 'missing'})")
          PY
          }

          ensure_features_scored_csv () {
            local dir="$1"
            if [ ! -d "${dir}" ]; then
              echo "[INFO] skip (missing dir): ${dir}"
              return 0
            fi
            if [ -f "${dir}/features_scored.csv" ]; then
              echo "[OK] already exists: ${dir}/features_scored.csv"
              return 0
            fi
            if [ -f "${dir}/features_scored.parquet" ]; then
              echo "[INFO] convert parquet -> csv: ${dir}/features_scored.parquet"
              DIR="${dir}" python - <<'PY'
          import os
          import pandas as pd
          d = os.environ["DIR"]
          df = pd.read_parquet(f"{d}/features_scored.parquet")
          df.to_csv(f"{d}/features_scored.csv", index=False)
          print("[DONE] wrote", f"{d}/features_scored.csv", "rows=", len(df))
          PY
              return 0
            fi
            echo "[WARN] no features_scored.(csv|parquet) in ${dir}"
          }

          # matrix -> TSV for bash loop
          python - <<'PY' > /tmp/periods.tsv
          import json
          m=json.load(open("/tmp/matrix.json","r"))["include"]
          for it in m:
              print("\t".join([
                  it["period"],
                  it["TRAIN_START"], it["TRAIN_END"],
                  it["VALID_START"], it["VALID_END"],
                  it["TEST_START"], it["TEST_END"],
                  it["CUT_DATE"],
              ]))
          PY

          total="$(wc -l < /tmp/periods.tsv | tr -d ' ')"
          idx=0

          while IFS=$'\t' read -r WF_PERIOD TRAIN_START TRAIN_END VALID_START VALID_END TEST_START TEST_END CUT_DATE; do
            idx=$((idx+1))
            TAG="wf_${WF_PERIOD}"
            MODEL_DIR="data/models/${TAG}"

            echo ""
            echo "===================="
            echo "[PERIOD] ${WF_PERIOD} (#${idx}/${total})"
            echo "===================="
            echo "[PERIOD] TAG=${TAG}"
            echo "[PERIOD] train=${TRAIN_START}..${TRAIN_END} cut=${CUT_DATE} test=${TEST_START}..${TEST_END}"

            mkdir -p "${MODEL_DIR}"

            ensure_universe

            # Build features (workspace shared)
            python scripts/build_features.py

            # ------------------------------------------------------------
            # Gate (rolling): build labels from TRAIN_START then cut <= CUT_DATE
            # ------------------------------------------------------------
            python scripts/build_labels.py \
              --profit-target "${PROFIT_TARGET}" \
              --max-days "${MAX_DAYS}" \
              --stop-level "${STOP_LEVEL}" \
              --start-date "${TRAIN_START}"

            # Cut gate features/labels to CUT_DATE + keep tagged copies
            TAG="${TAG}" CUT_DATE="${CUT_DATE}" python - <<'PY'
          import os
          from pathlib import Path
          import pandas as pd

          TAG=os.environ["TAG"]
          CUT=pd.to_datetime(os.environ["CUT_DATE"])

          def read_any(parq, csv):
              if Path(parq).exists(): return pd.read_parquet(parq)
              if Path(csv).exists():  return pd.read_csv(csv)
              raise FileNotFoundError(f"missing {parq} or {csv}")

          def write_parq(df, p):
              Path(p).parent.mkdir(parents=True, exist_ok=True)
              df.to_parquet(p, index=False)

          f = read_any("data/features/features_model.parquet", "data/features/features_model.csv")
          f["Date"] = pd.to_datetime(f["Date"], errors="coerce").dt.tz_localize(None)
          f = f.dropna(subset=["Date"])
          f_cut = f[f["Date"] <= CUT].copy()
          write_parq(f_cut, "data/features/features_model.parquet")
          write_parq(f_cut, f"data/features/features_model_{TAG}.parquet")
          print("[CUT] features_model rows=", len(f_cut))

          lm = read_any("data/labels/labels_model.parquet", "data/labels/labels_model.csv")
          lm["Date"] = pd.to_datetime(lm["Date"], errors="coerce").dt.tz_localize(None)
          lm = lm.dropna(subset=["Date"])
          lm_cut = lm[lm["Date"] <= CUT].copy()
          write_parq(lm_cut, "data/labels/labels_model.parquet")
          write_parq(lm_cut, f"data/labels/labels_model_{TAG}.parquet")
          print("[CUT] labels_model rows=", len(lm_cut))
          PY

            # ------------------------------------------------------------
            # Tail (expanding): build full then cut <= CUT_DATE
            # ------------------------------------------------------------
            python scripts/build_tail_labels.py \
              --profit-target "${PROFIT_TARGET}" \
              --max-days "${MAX_DAYS}" \
              --stop-level "${STOP_LEVEL}" \
              --max-extend-days "${MAX_EXTEND_DAYS}"

            TL="$(python - <<'PY'
          import glob
          cand=[]
          cand += glob.glob("data/labels/labels_tail*.parquet")
          cand += glob.glob("data/labels/labels_tail*.csv")
          cand += glob.glob("data/labels/*tail*labels*.parquet")
          cand += glob.glob("data/labels/*tail*labels*.csv")
          cand=sorted(set(cand))
          print(cand[0] if cand else "")
          PY
            )"
            echo "[TAIL] labels_path=${TL}"
            if [ -n "${TL}" ] && [ -f "${TL}" ]; then
              ext="$(python - <<'PY'
          import os
          p=os.environ["TL"]
          print(".parquet" if p.endswith(".parquet") else ".csv")
          PY
              TL="${TL}" )"
              # (bash var TL already set; above PY reads env, so export)
              export TL
              out_copy="data/labels/labels_tail_${TAG}${ext}"
              cut_file_inplace_by_date "${TL}" "${CUT_DATE}" "${out_copy}"
            fi

            # ------------------------------------------------------------
            # Tau (expanding): build tagged then cut <= CUT_DATE
            # ------------------------------------------------------------
            python scripts/build_tau_labels.py \
              --tag "${TAG}" \
              --profit-target "${PROFIT_TARGET}" \
              --max-days "${MAX_DAYS}" \
              --stop-level "${STOP_LEVEL}" \
              --max-extend-days "${MAX_EXTEND_DAYS}"

            TAUL="$(python - <<'PY'
          import os, glob
          tag=os.environ["TAG"]
          cand=[]
          cand += glob.glob(f"data/labels/*tau*{tag}*.parquet")
          cand += glob.glob(f"data/labels/*tau*{tag}*.csv")
          cand += glob.glob(f"data/labels/labels_tau_{tag}.parquet")
          cand += glob.glob(f"data/labels/labels_tau_{tag}.csv")
          cand=sorted(set(cand))
          print(cand[0] if cand else "")
          PY
            )"
            echo "[TAU] labels_path=${TAUL}"
            if [ -n "${TAUL}" ] && [ -f "${TAUL}" ]; then
              ext="$(python - <<'PY'
          import os
          p=os.environ["TAUL"]
          print(".parquet" if p.endswith(".parquet") else ".csv")
          PY
              TAUL="${TAUL}" )"
              export TAUL
              out_copy="data/labels/labels_tau_${TAG}${ext}"
              cut_file_inplace_by_date "${TAUL}" "${CUT_DATE}" "${out_copy}"
            fi

            # ------------------------------------------------------------
            # Sanity logs (Gate/Tail/Tau)
            # ------------------------------------------------------------
            TAG="${TAG}" summarize_labels "${TAG}"

            # ------------------------------------------------------------
            # Train Gate (rolling), Tail (expanding<=CUT), Tau (expanding<=CUT)
            # ------------------------------------------------------------
            echo "[TRAIN] python scripts/train_model.py --tag ${TAG}"
            python scripts/train_model.py --tag "${TAG}"

            echo "[TRAIN] python scripts/train_tail_model.py"
            python scripts/train_tail_model.py \
              --profit-target "${PROFIT_TARGET}" \
              --max-days "${MAX_DAYS}" \
              --stop-level "${STOP_LEVEL}" \
              --max-extend-days "${MAX_EXTEND_DAYS}"

            echo "[TRAIN] python scripts/train_tau_model.py --tag ${TAG}"
            python scripts/train_tau_model.py --tag "${TAG}"

            echo "[TRAIN] produced app/:"
            ls -la app | sed -n '1,200p'

            mf="$(pick_one "app/model_*${TAG}*.pkl")"
            sf="$(pick_one "app/scaler_*${TAG}*.pkl")"
            test -n "${mf}"
            test -n "${sf}"
            cp -v "${mf}" "${MODEL_DIR}/model.pkl"
            cp -v "${sf}" "${MODEL_DIR}/scaler.pkl"

            test -f "app/tail_model.pkl"
            test -f "app/tail_scaler.pkl"
            cp -v "app/tail_model.pkl" "${MODEL_DIR}/tail_model.pkl"
            cp -v "app/tail_scaler.pkl" "${MODEL_DIR}/tail_scaler.pkl"

            taum="$(pick_one "app/tau_model_*${TAG}*.pkl app/tau_model.pkl")"
            taus="$(pick_one "app/tau_scaler_*${TAG}*.pkl app/tau_scaler.pkl")"
            test -n "${taum}"
            test -n "${taus}"
            cp -v "${taum}" "${MODEL_DIR}/tau_model.pkl"
            cp -v "${taus}" "${MODEL_DIR}/tau_scaler.pkl"

            echo "[TRAIN] staged in ${MODEL_DIR}:"
            ls -la "${MODEL_DIR}" | sed -n '1,200p'

            # ------------------------------------------------------------
            # Walkforward #1 (no badexit for current period)
            # ------------------------------------------------------------
            export WF_PERIOD TRAIN_START TRAIN_END VALID_START VALID_END TEST_START TEST_END CUT_DATE
            export PROFIT_TARGET MAX_DAYS STOP_LEVEL
            export P_TAIL_THRESHOLDS UTILITY_QUANTILES RANK_METRICS LAMBDA_TAIL GATE_MODES TRAIL_STOPS TP1_FRAC ENABLE_TRAILING TOPK_CONFIGS PS_MINS BADEXIT_MAXES MAX_LEVERAGE_PCT
            export EXCLUDE_TICKERS REGIME_MODE REGIME_DD_MAX REGIME_RET20_MIN REGIME_ATR_MAX REGIME_LEVERAGE_MULT TAU_SPLIT USE_TAU_H ENABLE_DCA
            export MODEL_DIR
            export REQUIRE_FILES="data/models/${TAG}/model.pkl,data/models/${TAG}/scaler.pkl,data/models/${TAG}/tail_model.pkl,data/models/${TAG}/tail_scaler.pkl,data/models/${TAG}/tau_model.pkl,data/models/${TAG}/tau_scaler.pkl"
            export OUT_DIR_BASE="data/signals/walkforward"
            export WF_TAG_BASE="wf"

            echo "[RUN1] MODEL_DIR=${MODEL_DIR}"
            ls -la "${MODEL_DIR}" | sed -n '1,200p'
            ./scripts/run_walkforward_halfyear.sh

            echo "[RUN1] done. signals:"
            ls -la "data/signals/walkforward/${WF_PERIOD}" | sed -n '1,200p' || true

            # ------------------------------------------------------------
            # BadExit expanding (past-only pool)
            # ------------------------------------------------------------
            POOL="data/badexit_pool"
            mkdir -p "${POOL}"
            pool_files="$(find "${POOL}" -type f -name 'sim_engine_trades_*' | wc -l | tr -d ' ')"
            echo "[BADEXIT-EXP] pool dir=${POOL}"
            echo "[BADEXIT-EXP] pool files count=${pool_files}"

            BADEXIT_AVAILABLE="false"
            if [ "${pool_files}" != "0" ]; then
              BADEXIT_AVAILABLE="true"
              EX_TAG="$(ex_tag)"
              echo "[BADEXIT-EXP] EX_TAG=${EX_TAG}"

              # CHECK-1C (pool matched only)
              SIGNALS_DIR="${POOL}" EX_TAG="${EX_TAG}" python - <<'PY'
          import os, glob
          import pandas as pd
          d=os.environ["SIGNALS_DIR"]
          ex=os.environ["EX_TAG"]
          files=sorted(set(
              glob.glob(os.path.join(d, f"sim_engine_trades_{ex}__*.parquet")) +
              glob.glob(os.path.join(d, f"sim_engine_trades_{ex}__*.csv"))
          ))
          print(f"[CHECK-1C] SIGNALS_DIR={d}")
          print(f"[CHECK-1C] EX_TAG={ex}")
          print(f"[CHECK-1C] matched files={len(files)}")
          total=0
          shown=0
          for f in files:
              try:
                  df=pd.read_parquet(f) if f.endswith(".parquet") else pd.read_csv(f)
                  n=len(df)
              except Exception as e:
                  print(f"[CHECK-1C] read_fail file={f} err={e}")
                  continue
              total += n
              if shown < 10:
                  print(f"[CHECK-1C] rows={n} file={f}")
                  shown += 1
          print(f"[CHECK-1C] matched rows total={total}")
          PY

              python scripts/build_badexit_labels.py \
                --profit-target "${PROFIT_TARGET}" \
                --max-days "${MAX_DAYS}" \
                --stop-level "${STOP_LEVEL}" \
                --max-extend-days "${MAX_EXTEND_DAYS}" \
                --signals-dir "${POOL}" \
                --also-read-csv

              badlbl="$(pick_one "data/labels/labels_badexit_${EX_TAG}.parquet data/labels/labels_badexit_${EX_TAG}.csv data/labels/labels_badexit_*.parquet data/labels/labels_badexit_*.csv")"
              if [ -z "${badlbl}" ]; then
                echo "[ERROR] badexit labels not found"
                ls -la data/labels | sed -n '1,200p' || true
                exit 1
              fi
              echo "[BADEXIT] labels=${badlbl}"

              LABEL_COL="$(BADLBL="${badlbl}" python - <<'PY'
          import os
          import pandas as pd
          from pathlib import Path
          p=Path(os.environ["BADLBL"])
          df=pd.read_parquet(p) if p.suffix==".parquet" else pd.read_csv(p)
          cols=list(df.columns)
          for c in ["y_badexit","BadExit","badexit","is_badexit","label","target"]:
              if c in cols:
                  print(c)
                  raise SystemExit(0)
          print("__MISSING__")
          PY
              )"
              if [ "${LABEL_COL}" = "__MISSING__" ]; then
                echo "[ERROR] badexit label col missing in ${badlbl}"
                exit 1
              fi
              echo "[BADEXIT] detected label_col=${LABEL_COL}"

              # CHECK-2B
              BADLBL="${badlbl}" LABEL_COL="${LABEL_COL}" python - <<'PY'
          import os
          import pandas as pd
          from pathlib import Path
          p=Path(os.environ["BADLBL"]); lab=os.environ["LABEL_COL"]
          df=pd.read_parquet(p) if p.suffix==".parquet" else pd.read_csv(p)
          print(f"[CHECK-2B] labels_path={p}")
          print(f"[CHECK-2B] rows={len(df)} cols={len(df.columns)}")
          if "Ticker" in df.columns:
              print(f"[CHECK-2B] nunique(Ticker)={df['Ticker'].nunique()}")
          if "Date" in df.columns:
              print(f"[CHECK-2B] nunique(Date)={df['Date'].nunique()}")
          vc=df[lab].value_counts(dropna=False)
          print(f"[CHECK-2B] value_counts for {lab}")
          print(vc.to_string())
          try:
              s=pd.to_numeric(df[lab], errors="coerce")
              if s.notna().all() and set(s.unique()).issubset({0,1}):
                  print(f"[CHECK-2B] pos_rate={float(s.mean()):.6f}")
          except Exception:
              pass
          PY

              python scripts/train_badexit_model_wf_lite.py \
                --data-path "${badlbl}" \
                --label-col "${LABEL_COL}" \
                --out-model "app/badexit_model_${TAG}.pkl" \
                --out-scaler "app/badexit_scaler_${TAG}.pkl" \
                --out-report "data/meta/train_badexit_report_${TAG}.json"

              test -f "app/badexit_model_${TAG}.pkl"
              test -f "app/badexit_scaler_${TAG}.pkl"
              cp -v "app/badexit_model_${TAG}.pkl" "${MODEL_DIR}/badexit_model.pkl"
              cp -v "app/badexit_scaler_${TAG}.pkl" "${MODEL_DIR}/badexit_scaler.pkl"
              echo "[BADEXIT] staged in ${MODEL_DIR}:"
              ls -la "${MODEL_DIR}" | sed -n '1,200p'
            else
              echo "[BADEXIT-EXP] pool empty -> skip badexit training for ${TAG} (no lookahead)."
            fi

            # ------------------------------------------------------------
            # Walkforward #2 (with badexit) if available, else copy wf1 -> wf2
            # ------------------------------------------------------------
            if [ "${BADEXIT_AVAILABLE}" != "true" ]; then
              echo "[RUN2] skip (no badexit model). Copy walkforward -> walkforward2 for ${WF_PERIOD}"
              mkdir -p "data/signals/walkforward2/${WF_PERIOD}"
              rsync -a "data/signals/walkforward/${WF_PERIOD}/" "data/signals/walkforward2/${WF_PERIOD}/" || true
            else
              export REQUIRE_FILES="data/models/${TAG}/model.pkl,data/models/${TAG}/scaler.pkl,data/models/${TAG}/tail_model.pkl,data/models/${TAG}/tail_scaler.pkl,data/models/${TAG}/tau_model.pkl,data/models/${TAG}/tau_scaler.pkl,data/models/${TAG}/badexit_model.pkl,data/models/${TAG}/badexit_scaler.pkl"
              export OUT_DIR_BASE="data/signals/walkforward2"
              echo "[RUN2] MODEL_DIR=${MODEL_DIR}"
              ls -la "${MODEL_DIR}" | sed -n '1,200p'
              ./scripts/run_walkforward_halfyear.sh
            fi

            echo "[RUN2] done. signals:"
            ls -la "data/signals/walkforward2/${WF_PERIOD}" | sed -n '1,200p' || true

            # Ensure features_scored.csv in both outputs
            ensure_features_scored_csv "data/signals/walkforward/${WF_PERIOD}/_inputs"
            ensure_features_scored_csv "data/signals/walkforward2/${WF_PERIOD}/_inputs"

            # ------------------------------------------------------------
            # Add CURRENT period wf1 trades into pool for NEXT periods (past-only)
            # ------------------------------------------------------------
            EX_TAG="$(ex_tag)"
            SIGNALS_DIR="data/signals/walkforward/${WF_PERIOD}"
            echo "[POOL] add wf1 trades of ${WF_PERIOD} to pool (for next periods), EX_TAG=${EX_TAG}"
            shopt -s nullglob
            n=0
            for f in "${SIGNALS_DIR}"/sim_engine_trades_*.csv "${SIGNALS_DIR}"/sim_engine_trades_*.parquet; do
              base="$(basename "$f")"
              out="${POOL}/sim_engine_trades_${EX_TAG}__${WF_PERIOD}__${base}"
              if [ ! -f "${out}" ]; then
                cp -v "$f" "${out}"
                n=$((n+1))
              fi
            done
            echo "[POOL] copied ${n} files. pool now=$(find "${POOL}" -type f -name 'sim_engine_trades_*' | wc -l | tr -d ' ')"

          done < /tmp/periods.tsv

          echo "[DONE] all periods processed."
          echo "[TREE] signals walkforward:"
          find data/signals/walkforward -maxdepth 2 -type d | sed -n '1,200p' || true
          echo "[TREE] signals walkforward2:"
          find data/signals/walkforward2 -maxdepth 2 -type d | sed -n '1,200p' || true

      - name: Upload artifact (walkforward all)
        uses: actions/upload-artifact@v4
        with:
          name: walkforward_all
          path: data/signals/walkforward
          if-no-files-found: error

      - name: Upload artifact (walkforward2 all)
        uses: actions/upload-artifact@v4
        with:
          name: walkforward2_all
          path: data/signals/walkforward2
          if-no-files-found: error

      - name: Upload artifact (features_scored all)
        uses: actions/upload-artifact@v4
        with:
          name: features_scored_all
          path: |
            data/signals/walkforward/*/_inputs/features_scored.csv
            data/signals/walkforward/*/_inputs/features_scored.parquet
            data/signals/walkforward2/*/_inputs/features_scored.csv
            data/signals/walkforward2/*/_inputs/features_scored.parquet
          if-no-files-found: warn

  aggregate:
    name: aggregate-walkforward
    needs: [run]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (aggregate)
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U pandas pyarrow

      - name: Download walkforward_all artifact
        uses: actions/download-artifact@v4
        with:
          name: walkforward_all
          path: _wf_all

      - name: Rebuild expected folder structure (#1)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data/signals/walkforward
          rsync -a "_wf_all/" "data/signals/walkforward/"
          echo "[INFO] final tree:"
          find data/signals/walkforward -maxdepth 2 -type d | sed -n '1,200p'
          test "$(find data/signals/walkforward -mindepth 1 -maxdepth 1 -type d | wc -l)" -ge 1

      - name: Aggregate metrics across periods
        run: |
          set -euo pipefail
          python scripts/aggregate_walkforward_halfyear.py \
            --root data/signals/walkforward \
            --out data/signals/walkforward/_summary_walkforward.csv

          ls -la data/signals/walkforward | sed -n '1,200p'
          test -f data/signals/walkforward/_summary_walkforward.csv

      - name: Analyze summary (rank configs)
        run: |
          set -euo pipefail
          python scripts/analyze_walkforward_summary.py \
            --summary data/signals/walkforward/_summary_walkforward.csv \
            --out data/signals/walkforward/_analysis_walkforward.csv

          ls -la data/signals/walkforward | sed -n '1,200p'
          test -f data/signals/walkforward/_analysis_walkforward.csv

      - name: Upload artifact (walkforward summary)
        uses: actions/upload-artifact@v4
        with:
          name: walkforward_summary
          path: |
            data/signals/walkforward/_summary_walkforward.csv
            data/signals/walkforward/_analysis_walkforward.csv
          if-no-files-found: error