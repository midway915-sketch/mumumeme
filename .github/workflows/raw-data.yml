name: raw-data

on:
  workflow_dispatch:
    inputs:
      raw_data_url:
        description: "URL to prices.parquet or prices.csv"
        required: true
      raw_data_format:
        description: "parquet or csv"
        required: true
        default: "parquet"

jobs:
  build-raw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare folders
        run: |
          mkdir -p data/raw

      - name: Download raw prices
        shell: bash
        run: |
          set -euo pipefail
          url="${{ inputs.raw_data_url }}"
          fmt="$(echo "${{ inputs.raw_data_format }}" | tr '[:upper:]' '[:lower:]' | xargs)"
          if [[ "$fmt" != "parquet" && "$fmt" != "csv" ]]; then
            echo "[ERROR] raw_data_format must be parquet|csv"
            exit 1
          fi

          out="data/raw/prices.${fmt}"
          echo "[INFO] downloading -> $out"
          curl -L --fail --retry 3 --retry-delay 2 -o "$out" "$url"
          ls -la data/raw

      - name: Upload artifact raw-data
        uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: data/raw
          if-no-files-found: error