name: walkforward-halfyear

on:
  workflow_dispatch:
    inputs:
      wf_start:
        description: "first half-year (e.g. 2018H1)"
        required: true
        default: "2018H1"
      wf_end:
        description: "last half-year (e.g. 2025H2)"
        required: true
        default: "2025H2"
      train_years:
        description: "train window in years (e.g. 12)"
        required: true
        default: "12"

      PROFIT_TARGET:
        description: "profit target (e.g. 0.10)"
        required: true
        default: "0.10"
      MAX_DAYS:
        description: "max holding days H (e.g. 40)"
        required: true
        default: "40"
      STOP_LEVEL:
        description: "stop level (e.g. -0.10)"
        required: true
        default: "-0.10"

jobs:
  raw-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (raw-data)
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U yfinance pandas pyarrow

      - name: Build universe.csv (if missing)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data
          if [ ! -f data/universe.csv ]; then
            echo "[INFO] data/universe.csv missing -> generating via scripts/universe.py"
            python scripts/universe.py
          fi
          ls -la data | sed -n '1,200p'
          test -f data/universe.csv

      - name: Fetch raw prices (Yahoo)
        env:
          MAX_YEARS: "16"
        run: |
          set -euo pipefail
          mkdir -p data/raw
          python scripts/fetch_prices.py --include-extra
          ls -la data/raw
          test -f data/raw/prices.parquet -o -f data/raw/prices.csv

      - name: Upload artifact raw-data
        uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: data/raw
          if-no-files-found: error

  make-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Generate half-year matrix JSON
        id: gen
        shell: bash
        run: |
          python - <<'PY' > /tmp/matrix.json
          import json, re
          from datetime import date, timedelta

          wf_start = "${{ inputs.wf_start }}".strip()
          wf_end   = "${{ inputs.wf_end }}".strip()
          train_years = int("${{ inputs.train_years }}")

          m = re.fullmatch(r"(\d{4})H([12])", wf_start)
          n = re.fullmatch(r"(\d{4})H([12])", wf_end)
          if not m or not n:
            raise SystemExit("wf_start/wf_end must be like 2018H1")

          sy, sh = int(m.group(1)), int(m.group(2))
          ey, eh = int(n.group(1)), int(n.group(2))

          def half_start(y,h): return date(y,1,1) if h==1 else date(y,7,1)
          def half_end(y,h):   return date(y,6,30) if h==1 else date(y,12,31)

          items=[]
          y,h=sy,sh
          while True:
            period=f"{y}H{h}"
            test_start=half_start(y,h); test_end=half_end(y,h)
            vy,vh=(y-1,2) if h==1 else (y,1)
            valid_start=half_start(vy,vh); valid_end=half_end(vy,vh)
            train_end=valid_start - timedelta(days=1)
            train_start=date(train_end.year-train_years+1, train_end.month, train_end.day)
            cut_date=valid_end
            items.append({
              "period":period,
              "TRAIN_START":train_start.isoformat(),
              "TRAIN_END":train_end.isoformat(),
              "VALID_START":valid_start.isoformat(),
              "VALID_END":valid_end.isoformat(),
              "TEST_START":test_start.isoformat(),
              "TEST_END":test_end.isoformat(),
              "CUT_DATE":cut_date.isoformat(),
            })
            if y==ey and h==eh: break
            if h==1: h=2
            else: y+=1; h=1

          print(json.dumps({"include":items}, ensure_ascii=False))
          PY

          echo "matrix<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/matrix.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  run:
    # NOTE:
    # - Gate: rolling (TRAIN_START..CUT_DATE)
    # - Tail/Tau: expanding (..CUT_DATE)
    # - BadExit: expanding past-only pool
    # SPEEDUP:
    # - build_features once, build_gate_labels once (min TRAIN_START), build_tail_labels once
    needs: [raw-data, make-matrix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U pandas pyarrow

      - name: Download raw-data artifact
        uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: data/raw

      - name: Verify raw-data present
        run: |
          ls -la data/raw
          test -f data/raw/prices.parquet -o -f data/raw/prices.csv

      - name: Run walkforward (fast precompute + loop)
        env:
          MATRIX_JSON: ${{ needs.make-matrix.outputs.matrix }}

          PROFIT_TARGET: ${{ inputs.PROFIT_TARGET }}
          MAX_DAYS: ${{ inputs.MAX_DAYS }}
          STOP_LEVEL: ${{ inputs.STOP_LEVEL }}
          MAX_EXTEND_DAYS: "20"

          P_TAIL_THRESHOLDS: "0.10,0.20,0.30"
          UTILITY_QUANTILES: "0.60,0.75,0.90"
          RANK_METRICS: "utility"
          LAMBDA_TAIL: "1.0"
          GATE_MODES: "tail_utility"
          TRAIL_STOPS: "0.10"
          TP1_FRAC: "0.50"
          ENABLE_TRAILING: "true"
          TOPK_CONFIGS: "1|1.0"
          PS_MINS: "0.00"
          BADEXIT_MAXES: "1.00"
          MAX_LEVERAGE_PCT: "1.0"

          EXCLUDE_TICKERS: ""

          REGIME_MODE: "off"
          REGIME_DD_MAX: "0.20"
          REGIME_RET20_MIN: "0.00"
          REGIME_ATR_MAX: "1.30"
          REGIME_LEVERAGE_MULT: "3.0"

          TAU_SPLIT: ""
          USE_TAU_H: "false"
          ENABLE_DCA: "false"

          WF_TAG_BASE: wf
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/run_walkforward_halfyear.sh

          echo "$MATRIX_JSON" > /tmp/matrix.json

          python - <<'PY'
          import json
          m=json.load(open("/tmp/matrix.json","r"))["include"]
          assert m, "matrix include empty"
          print("[OK] periods=", len(m))
          print("[OK] first=", m[0]["period"], "last=", m[-1]["period"])
          for i,it in enumerate(m, start=1):
              print(f"[PLAN] {i:02d} {it['period']} train={it['TRAIN_START']}..{it['TRAIN_END']} cut={it['CUT_DATE']} test={it['TEST_START']}..{it['TEST_END']}")
          PY

          mkdir -p data/features data/labels data/meta app
          mkdir -p data/models data/signals/walkforward data/signals/walkforward2
          mkdir -p data/badexit_pool

          pick_one () {
            local pat="$1"
            local f
            f="$(ls -1 ${pat} 2>/dev/null | head -n 1 || true)"
            echo "${f}"
          }

          ensure_universe () {
            if [ -f data/universe.csv ]; then return 0; fi
            echo "[INFO] data/universe.csv missing -> generating from raw prices"
            python - <<'PY'
          from pathlib import Path
          import pandas as pd
          raw_parq = Path("data/raw/prices.parquet")
          raw_csv  = Path("data/raw/prices.csv")
          if raw_parq.exists():
              df = pd.read_parquet(raw_parq)
          elif raw_csv.exists():
              df = pd.read_csv(raw_csv)
          else:
              raise SystemExit("[ERROR] raw prices missing")
          if "Ticker" not in df.columns:
              raise SystemExit("[ERROR] raw prices missing Ticker column")
          ticks = (
              df["Ticker"].astype(str).str.upper().str.strip()
                .dropna().unique().tolist()
          )
          ticks = sorted(set([t for t in ticks if t]))
          out = pd.DataFrame({"Ticker": ticks, "Enabled": True})
          Path("data").mkdir(parents=True, exist_ok=True)
          out.to_csv("data/universe.csv", index=False)
          print(f"[DONE] wrote data/universe.csv tickers={len(out)}")
          PY
          }

          ex_tag () {
            python - <<'PY'
          import os
          pt=float(os.environ["PROFIT_TARGET"])
          h=int(os.environ["MAX_DAYS"])
          sl=float(os.environ["STOP_LEVEL"])
          ex=int(os.environ["MAX_EXTEND_DAYS"])
          pt_i=int(round(pt*100))
          sl_i=int(round(abs(sl)*100))
          print(f"pt{pt_i}_h{h}_sl{sl_i}_ex{ex}")
          PY
          }

          # fast filter helper
          filter_by_date () {
            # args: IN_PATH OUT_PATH CUT_DATE START_DATE(optional)
            local in_path="$1"
            local out_path="$2"
            local cut="$3"
            local start="${4:-}"
            IN_PATH="${in_path}" OUT_PATH="${out_path}" CUT_DATE="${cut}" START_DATE="${start}" python - <<'PY'
          import os
          import pandas as pd
          from pathlib import Path

          inp=Path(os.environ["IN_PATH"])
          out=Path(os.environ["OUT_PATH"])
          cut=pd.to_datetime(os.environ["CUT_DATE"])
          start=os.environ.get("START_DATE","").strip()
          start_dt=pd.to_datetime(start) if start else None

          if not inp.exists():
              raise SystemExit(f"[FILTER] missing: {inp}")

          df=pd.read_parquet(inp) if inp.suffix==".parquet" else pd.read_csv(inp)

          if "Date" not in df.columns:
              out.parent.mkdir(parents=True, exist_ok=True)
              if out.suffix==".parquet":
                  df.to_parquet(out, index=False)
              else:
                  df.to_csv(out, index=False)
              print(f"[FILTER] no Date -> passthrough {inp} -> {out} rows={len(df)}")
              raise SystemExit(0)

          dt=pd.to_datetime(df["Date"], errors="coerce").dt.tz_localize(None)
          df=df.loc[dt.notna()].copy()
          df["Date"]=dt.loc[dt.notna()].values

          before=len(df)
          df=df[df["Date"]<=cut].copy()
          if start_dt is not None:
              df=df[df["Date"]>=start_dt].copy()
          after=len(df)

          out.parent.mkdir(parents=True, exist_ok=True)
          if out.suffix==".parquet":
              df.to_parquet(out, index=False)
          else:
              df.to_csv(out, index=False)
          print(f"[FILTER] {inp} -> {out}: {before} -> {after}")
          PY
          }

          ensure_features_scored_csv () {
            local dir="$1"
            if [ ! -d "${dir}" ]; then
              echo "[INFO] skip (missing dir): ${dir}"
              return 0
            fi
            if [ -f "${dir}/features_scored.csv" ]; then
              echo "[OK] already exists: ${dir}/features_scored.csv"
              return 0
            fi
            if [ -f "${dir}/features_scored.parquet" ]; then
              echo "[INFO] convert parquet -> csv: ${dir}/features_scored.parquet"
              DIR="${dir}" python - <<'PY'
          import os
          import pandas as pd
          d = os.environ["DIR"]
          df = pd.read_parquet(f"{d}/features_scored.parquet")
          df.to_csv(f"{d}/features_scored.csv", index=False)
          print("[DONE] wrote", f"{d}/features_scored.csv", "rows=", len(df))
          PY
              return 0
            fi
            echo "[WARN] no features_scored.(csv|parquet) in ${dir}"
          }

          # write periods + min train start
          python - <<'PY' > /tmp/periods.tsv
          import json
          m=json.load(open("/tmp/matrix.json","r"))["include"]
          for it in m:
              print("\t".join([
                  it["period"],
                  it["TRAIN_START"], it["TRAIN_END"],
                  it["VALID_START"], it["VALID_END"],
                  it["TEST_START"], it["TEST_END"],
                  it["CUT_DATE"],
              ]))
          PY

          MIN_TRAIN_START="$(python - <<'PY'
          import json
          m=json.load(open("/tmp/matrix.json","r"))["include"]
          print(min(it["TRAIN_START"] for it in m))
          PY
          )"
          echo "[PRE] MIN_TRAIN_START=${MIN_TRAIN_START}"

          # ============================================================
          # PRECOMPUTE ONCE
          # ============================================================
          ensure_universe

          echo "[PRE] build_features once"
          python scripts/build_features.py

          if [ -f data/features/features_model.parquet ]; then
            cp -v data/features/features_model.parquet data/features/features_model_full.parquet
            FEAT_FULL="data/features/features_model_full.parquet"
            FEAT_OUT="data/features/features_model.parquet"
            FEAT_TAG_OUT_PREFIX="data/features/features_model_"
          elif [ -f data/features/features_model.csv ]; then
            cp -v data/features/features_model.csv data/features/features_model_full.csv
            FEAT_FULL="data/features/features_model_full.csv"
            FEAT_OUT="data/features/features_model.csv"
            FEAT_TAG_OUT_PREFIX="data/features/features_model_"
          else
            echo "[ERROR] features_model not found after build_features"
            ls -la data/features | sed -n '1,200p' || true
            exit 1
          fi

          echo "[PRE] build gate labels once (start=${MIN_TRAIN_START})"
          python scripts/build_labels.py \
            --profit-target "${PROFIT_TARGET}" \
            --max-days "${MAX_DAYS}" \
            --stop-level "${STOP_LEVEL}" \
            --start-date "${MIN_TRAIN_START}"

          if [ -f data/labels/labels_model.parquet ]; then
            cp -v data/labels/labels_model.parquet data/labels/labels_model_full.parquet
            GATE_FULL="data/labels/labels_model_full.parquet"
            GATE_OUT="data/labels/labels_model.parquet"
            GATE_TAG_OUT_PREFIX="data/labels/labels_model_"
          elif [ -f data/labels/labels_model.csv ]; then
            cp -v data/labels/labels_model.csv data/labels/labels_model_full.csv
            GATE_FULL="data/labels/labels_model_full.csv"
            GATE_OUT="data/labels/labels_model.csv"
            GATE_TAG_OUT_PREFIX="data/labels/labels_model_"
          else
            echo "[ERROR] labels_model not found after build_labels"
            ls -la data/labels | sed -n '1,240p' || true
            exit 1
          fi

          echo "[PRE] build tail labels once"
          python scripts/build_tail_labels.py \
            --profit-target "${PROFIT_TARGET}" \
            --max-days "${MAX_DAYS}" \
            --stop-level "${STOP_LEVEL}" \
            --max-extend-days "${MAX_EXTEND_DAYS}"

          EX_TAG="$(ex_tag)"
          echo "[PRE] EX_TAG=${EX_TAG}"

          if [ -f "data/labels/labels_tail_${EX_TAG}.parquet" ]; then
            cp -v "data/labels/labels_tail_${EX_TAG}.parquet" "data/labels/labels_tail_full_${EX_TAG}.parquet"
            TAIL_FULL="data/labels/labels_tail_full_${EX_TAG}.parquet"
            TAIL_OUT="data/labels/labels_tail_${EX_TAG}.parquet"
            TAIL_TAG_OUT_PREFIX="data/labels/labels_tail_"
          elif [ -f "data/labels/labels_tail_${EX_TAG}.csv" ]; then
            cp -v "data/labels/labels_tail_${EX_TAG}.csv" "data/labels/labels_tail_full_${EX_TAG}.csv"
            TAIL_FULL="data/labels/labels_tail_full_${EX_TAG}.csv"
            TAIL_OUT="data/labels/labels_tail_${EX_TAG}.csv"
            TAIL_TAG_OUT_PREFIX="data/labels/labels_tail_"
          else
            echo "[ERROR] tail labels not found after build_tail_labels"
            ls -la data/labels | sed -n '1,240p' || true
            exit 1
          fi

          # ============================================================
          # LOOP
          # ============================================================
          total="$(wc -l < /tmp/periods.tsv | tr -d ' ')"
          idx=0

          while IFS=$'\t' read -r WF_PERIOD TRAIN_START TRAIN_END VALID_START VALID_END TEST_START TEST_END CUT_DATE; do
            idx=$((idx+1))
            TAG="wf_${WF_PERIOD}"
            MODEL_DIR="data/models/${TAG}"
            mkdir -p "${MODEL_DIR}"

            echo ""
            echo "===================="
            echo "[PERIOD] ${WF_PERIOD} (#${idx}/${total})"
            echo "===================="
            echo "[PERIOD] train=${TRAIN_START}..${TRAIN_END} cut=${CUT_DATE} test=${TEST_START}..${TEST_END}"

            # Gate rolling: features <= cut, labels train_start..cut
            filter_by_date "${FEAT_FULL}" "${FEAT_OUT}" "${CUT_DATE}" ""
            if [[ "${FEAT_OUT}" == *.parquet ]]; then
              cp -f "${FEAT_OUT}" "${FEAT_TAG_OUT_PREFIX}${TAG}.parquet"
            else
              cp -f "${FEAT_OUT}" "${FEAT_TAG_OUT_PREFIX}${TAG}.csv"
            fi

            filter_by_date "${GATE_FULL}" "${GATE_OUT}" "${CUT_DATE}" "${TRAIN_START}"
            if [[ "${GATE_OUT}" == *.parquet ]]; then
              cp -f "${GATE_OUT}" "${GATE_TAG_OUT_PREFIX}${TAG}.parquet"
            else
              cp -f "${GATE_OUT}" "${GATE_TAG_OUT_PREFIX}${TAG}.csv"
            fi

            # Tail expanding: <= cut
            filter_by_date "${TAIL_FULL}" "${TAIL_OUT}" "${CUT_DATE}" ""
            if [[ "${TAIL_OUT}" == *.parquet ]]; then
              cp -f "${TAIL_OUT}" "${TAIL_TAG_OUT_PREFIX}${TAG}.parquet"
            else
              cp -f "${TAIL_OUT}" "${TAIL_TAG_OUT_PREFIX}${TAG}.csv"
            fi

            # Tau expanding tagged: build + cut
            python scripts/build_tau_labels.py \
              --tag "${TAG}" \
              --profit-target "${PROFIT_TARGET}" \
              --max-days "${MAX_DAYS}" \
              --stop-level "${STOP_LEVEL}" \
              --max-extend-days "${MAX_EXTEND_DAYS}"

            TAUL="$(python - <<'PY'
          import os, glob
          tag=os.environ.get("TAG","")
          cand=[]
          cand += glob.glob(f"data/labels/labels_tau_{tag}.parquet")
          cand += glob.glob(f"data/labels/labels_tau_{tag}.csv")
          cand += glob.glob(f"data/labels/*tau*{tag}*.parquet")
          cand += glob.glob(f"data/labels/*tau*{tag}*.csv")
          cand=sorted(set(cand))
          print(cand[0] if cand else "")
          PY
            )"
            if [ -z "${TAUL}" ] || [ ! -f "${TAUL}" ]; then
              echo "[ERROR] tau labels missing for ${TAG}"
              ls -la data/labels | sed -n '1,240p' || true
              exit 1
            fi

            if [[ "${TAUL}" == *.parquet ]]; then
              filter_by_date "${TAUL}" "data/labels/labels_tau_${TAG}.parquet" "${CUT_DATE}" ""
            else
              filter_by_date "${TAUL}" "data/labels/labels_tau_${TAG}.csv" "${CUT_DATE}" ""
            fi

            # Train models
            echo "[TRAIN] gate"
            python scripts/train_model.py --tag "${TAG}"

            echo "[TRAIN] tail"
            python scripts/train_tail_model.py \
              --profit-target "${PROFIT_TARGET}" \
              --max-days "${MAX_DAYS}" \
              --stop-level "${STOP_LEVEL}" \
              --max-extend-days "${MAX_EXTEND_DAYS}"

            echo "[TRAIN] tau"
            python scripts/train_tau_model.py --tag "${TAG}"

            # Stage models
            mf="$(pick_one "app/model_*${TAG}*.pkl")"
            sf="$(pick_one "app/scaler_*${TAG}*.pkl")"
            test -n "${mf}" && test -n "${sf}"
            cp -v "${mf}" "${MODEL_DIR}/model.pkl"
            cp -v "${sf}" "${MODEL_DIR}/scaler.pkl"

            test -f app/tail_model.pkl && test -f app/tail_scaler.pkl
            cp -v app/tail_model.pkl "${MODEL_DIR}/tail_model.pkl"
            cp -v app/tail_scaler.pkl "${MODEL_DIR}/tail_scaler.pkl"

            taum="$(pick_one "app/tau_model_*${TAG}*.pkl app/tau_model.pkl")"
            taus="$(pick_one "app/tau_scaler_*${TAG}*.pkl app/tau_scaler.pkl")"
            test -n "${taum}" && test -n "${taus}"
            cp -v "${taum}" "${MODEL_DIR}/tau_model.pkl"
            cp -v "${taus}" "${MODEL_DIR}/tau_scaler.pkl"

            # Walkforward #1
            export WF_PERIOD TRAIN_START TRAIN_END VALID_START VALID_END TEST_START TEST_END CUT_DATE
            export PROFIT_TARGET MAX_DAYS STOP_LEVEL
            export P_TAIL_THRESHOLDS UTILITY_QUANTILES RANK_METRICS LAMBDA_TAIL GATE_MODES TRAIL_STOPS TP1_FRAC ENABLE_TRAILING TOPK_CONFIGS PS_MINS BADEXIT_MAXES MAX_LEVERAGE_PCT
            export EXCLUDE_TICKERS REGIME_MODE REGIME_DD_MAX REGIME_RET20_MIN REGIME_ATR_MAX REGIME_LEVERAGE_MULT TAU_SPLIT USE_TAU_H ENABLE_DCA
            export MODEL_DIR
            export REQUIRE_FILES="data/models/${TAG}/model.pkl,data/models/${TAG}/scaler.pkl,data/models/${TAG}/tail_model.pkl,data/models/${TAG}/tail_scaler.pkl,data/models/${TAG}/tau_model.pkl,data/models/${TAG}/tau_scaler.pkl"
            export OUT_DIR_BASE="data/signals/walkforward"
            export WF_TAG_BASE="wf"

            ./scripts/run_walkforward_halfyear.sh

            # BadExit expanding (past-only pool)
            POOL="data/badexit_pool"
            mkdir -p "${POOL}"
            pool_files="$(find "${POOL}" -type f -name 'sim_engine_trades_*' | wc -l | tr -d ' ')"
            BADEXIT_AVAILABLE="false"

            if [ "${pool_files}" != "0" ]; then
              BADEXIT_AVAILABLE="true"
              python scripts/build_badexit_labels.py \
                --profit-target "${PROFIT_TARGET}" \
                --max-days "${MAX_DAYS}" \
                --stop-level "${STOP_LEVEL}" \
                --max-extend-days "${MAX_EXTEND_DAYS}" \
                --signals-dir "${POOL}" \
                --also-read-csv

              badlbl="$(pick_one "data/labels/labels_badexit_${EX_TAG}.parquet data/labels/labels_badexit_${EX_TAG}.csv data/labels/labels_badexit_*.parquet data/labels/labels_badexit_*.csv")"
              test -n "${badlbl}"

              LABEL_COL="$(BADLBL="${badlbl}" python - <<'PY'
          import os
          import pandas as pd
          from pathlib import Path
          p=Path(os.environ["BADLBL"])
          df=pd.read_parquet(p) if p.suffix==".parquet" else pd.read_csv(p)
          cols=set(df.columns)
          for c in ["y_badexit","BadExit","badexit","is_badexit","label","target"]:
              if c in cols:
                  print(c)
                  raise SystemExit(0)
          print("__MISSING__")
          PY
              )"
              test "${LABEL_COL}" != "__MISSING__"

              python scripts/train_badexit_model_wf_lite.py \
                --data-path "${badlbl}" \
                --label-col "${LABEL_COL}" \
                --out-model "app/badexit_model_${TAG}.pkl" \
                --out-scaler "app/badexit_scaler_${TAG}.pkl" \
                --out-report "data/meta/train_badexit_report_${TAG}.json"

              test -f "app/badexit_model_${TAG}.pkl" && test -f "app/badexit_scaler_${TAG}.pkl"
              cp -v "app/badexit_model_${TAG}.pkl" "${MODEL_DIR}/badexit_model.pkl"
              cp -v "app/badexit_scaler_${TAG}.pkl" "${MODEL_DIR}/badexit_scaler.pkl"
            fi

            # Walkforward #2
            if [ "${BADEXIT_AVAILABLE}" != "true" ]; then
              mkdir -p "data/signals/walkforward2/${WF_PERIOD}"
              rsync -a "data/signals/walkforward/${WF_PERIOD}/" "data/signals/walkforward2/${WF_PERIOD}/" || true
            else
              export REQUIRE_FILES="data/models/${TAG}/model.pkl,data/models/${TAG}/scaler.pkl,data/models/${TAG}/tail_model.pkl,data/models/${TAG}/tail_scaler.pkl,data/models/${TAG}/tau_model.pkl,data/models/${TAG}/tau_scaler.pkl,data/models/${TAG}/badexit_model.pkl,data/models/${TAG}/badexit_scaler.pkl"
              export OUT_DIR_BASE="data/signals/walkforward2"
              ./scripts/run_walkforward_halfyear.sh
            fi

            ensure_features_scored_csv "data/signals/walkforward/${WF_PERIOD}/_inputs"
            ensure_features_scored_csv "data/signals/walkforward2/${WF_PERIOD}/_inputs"

            # Add current wf1 trades to pool for next periods
            SIGNALS_DIR="data/signals/walkforward/${WF_PERIOD}"
            shopt -s nullglob
            n=0
            for f in "${SIGNALS_DIR}"/sim_engine_trades_*.csv "${SIGNALS_DIR}"/sim_engine_trades_*.parquet; do
              base="$(basename "$f")"
              out="${POOL}/sim_engine_trades_${EX_TAG}__${WF_PERIOD}__${base}"
              if [ ! -f "${out}" ]; then
                cp -v "$f" "${out}"
                n=$((n+1))
              fi
            done
            echo "[POOL] copied ${n} files."
          done < /tmp/periods.tsv

      - name: Upload artifact (walkforward all)
        uses: actions/upload-artifact@v4
        with:
          name: walkforward_all
          path: data/signals/walkforward
          if-no-files-found: error

      - name: Upload artifact (walkforward2 all)
        uses: actions/upload-artifact@v4
        with:
          name: walkforward2_all
          path: data/signals/walkforward2
          if-no-files-found: error

      - name: Upload artifact (features_scored all)
        uses: actions/upload-artifact@v4
        with:
          name: features_scored_all
          path: |
            data/signals/walkforward/*/_inputs/features_scored.csv
            data/signals/walkforward/*/_inputs/features_scored.parquet
            data/signals/walkforward2/*/_inputs/features_scored.csv
            data/signals/walkforward2/*/_inputs/features_scored.parquet
          if-no-files-found: warn

  aggregate:
    name: aggregate-walkforward
    needs: [run]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (aggregate)
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U pandas pyarrow

      - name: Download walkforward_all artifact
        uses: actions/download-artifact@v4
        with:
          name: walkforward_all
          path: _wf_all

      - name: Rebuild expected folder structure (#1)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data/signals/walkforward
          rsync -a "_wf_all/" "data/signals/walkforward/"
          find data/signals/walkforward -maxdepth 2 -type d | sed -n '1,200p'
          test "$(find data/signals/walkforward -mindepth 1 -maxdepth 1 -type d | wc -l)" -ge 1

      - name: Aggregate metrics across periods
        run: |
          set -euo pipefail
          python scripts/aggregate_walkforward_halfyear.py \
            --root data/signals/walkforward \
            --out data/signals/walkforward/_summary_walkforward.csv
          test -f data/signals/walkforward/_summary_walkforward.csv

      - name: Analyze summary (rank configs)
        run: |
          set -euo pipefail
          python scripts/analyze_walkforward_summary.py \
            --summary data/signals/walkforward/_summary_walkforward.csv \
            --out data/signals/walkforward/_analysis_walkforward.csv
          test -f data/signals/walkforward/_analysis_walkforward.csv

      - name: Upload artifact (walkforward summary)
        uses: actions/upload-artifact@v4
        with:
          name: walkforward_summary
          path: |
            data/signals/walkforward/_summary_walkforward.csv
            data/signals/walkforward/_analysis_walkforward.csv
          if-no-files-found: error